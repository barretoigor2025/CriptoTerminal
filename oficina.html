<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f141b">
<title>Oficina · Gestão de Serviços</title>
<style>
/* ===================== TOKENS ===================== */
:root{
  --bg:#eef1f5; --surface:#ffffff; --surface-2:#f6f8fb; --hair:#e2e7ee; --hair-2:#d3dae4;
  --ink:#18202c; --muted:#5c6675; --muted-2:#8a94a3;
  --primary:#2f6bd6; --primary-ink:#ffffff; --primary-soft:rgba(47,107,214,.10);
  --amber:#e08409; --green:#12996a; --red:#dc4d47; --purple:#7256e6; --slate:#64748b;
  --shadow:0 1px 2px rgba(20,30,50,.06),0 8px 24px rgba(20,30,50,.08);
  --radius:14px; --radius-sm:9px;
  --st-orcamento:#7256e6; --st-aguardando:#64748b; --st-em_servico:#e08409;
  --st-pronto:#2f6bd6; --st-entregue:#12996a; --st-recusado:#dc4d47;
}
@media (prefers-color-scheme:dark){
  :root{
    --bg:#0d1219; --surface:#151d27; --surface-2:#111925; --hair:#243040; --hair-2:#2f3d4f;
    --ink:#e8eef6; --muted:#9aa6b6; --muted-2:#6b7889;
    --primary:#4d86ec; --primary-soft:rgba(77,134,236,.14);
    --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px rgba(0,0,0,.35);
  }
}
:root[data-theme="light"]{
  --bg:#eef1f5; --surface:#fff; --surface-2:#f6f8fb; --hair:#e2e7ee; --hair-2:#d3dae4;
  --ink:#18202c; --muted:#5c6675; --muted-2:#8a94a3; --primary:#2f6bd6; --primary-soft:rgba(47,107,214,.10);
  --shadow:0 1px 2px rgba(20,30,50,.06),0 8px 24px rgba(20,30,50,.08);
}
:root[data-theme="dark"]{
  --bg:#0d1219; --surface:#151d27; --surface-2:#111925; --hair:#243040; --hair-2:#2f3d4f;
  --ink:#e8eef6; --muted:#9aa6b6; --muted-2:#6b7889; --primary:#4d86ec; --primary-soft:rgba(77,134,236,.14);
  --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--ink); font-size:15px; line-height:1.5;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
}
.tnum{font-variant-numeric:tabular-nums}
button{font-family:inherit;cursor:pointer}
a{color:inherit}
input,select,textarea{font-family:inherit;font-size:15px}

/* ===================== APP SHELL ===================== */
.app{display:grid;grid-template-columns:236px 1fr;min-height:100vh}
.sidebar{
  background:var(--surface);border-right:1px solid var(--hair);padding:16px 12px;
  position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:4px;
}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 14px}
.brand .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--primary),#1f4fa8);
  display:grid;place-items:center;color:#fff;flex:none}
.brand .logo svg{width:19px;height:19px}
.brand .txt b{display:block;font-size:15px;letter-spacing:-.01em;line-height:1.1}
.brand .txt span{font-size:11px;color:var(--muted-2);letter-spacing:.02em}
.nav{display:flex;flex-direction:column;gap:2px;margin-top:4px}
.nav button{
  display:flex;align-items:center;gap:11px;width:100%;text-align:left;border:none;background:none;
  color:var(--muted);padding:9px 11px;border-radius:10px;font-size:14.5px;font-weight:500;transition:.12s;
}
.nav button svg{width:18px;height:18px;flex:none;stroke-width:1.9}
.nav button:hover{background:var(--surface-2);color:var(--ink)}
.nav button.active{background:var(--primary-soft);color:var(--primary);font-weight:650}
.nav .badge{margin-left:auto;background:var(--amber);color:#fff;font-size:11px;font-weight:700;
  min-width:19px;height:19px;border-radius:10px;display:grid;place-items:center;padding:0 5px}
.side-foot{margin-top:auto;display:flex;flex-direction:column;gap:8px;padding:8px 6px 2px;border-top:1px solid var(--hair)}
.side-foot .row{display:flex;gap:8px}
.mini-btn{flex:1;border:1px solid var(--hair);background:var(--surface);color:var(--muted);
  border-radius:8px;padding:7px;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px}
.mini-btn:hover{border-color:var(--hair-2);color:var(--ink)}
.mini-btn svg{width:14px;height:14px}

/* main */
.main{min-width:0;display:flex;flex-direction:column}
.topbar{
  position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 82%,transparent);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--hair);
  display:flex;align-items:center;gap:12px;padding:12px 20px;
}
.topbar h1{font-size:19px;margin:0;font-weight:700;letter-spacing:-.01em}
.topbar .sub{font-size:12.5px;color:var(--muted-2);margin-top:1px}
.topbar .spacer{flex:1}
.btn{
  display:inline-flex;align-items:center;gap:8px;border:1px solid var(--hair);background:var(--surface);
  color:var(--ink);padding:9px 14px;border-radius:10px;font-size:14px;font-weight:600;transition:.12s;white-space:nowrap;
}
.btn:hover{border-color:var(--hair-2)}
.btn svg{width:16px;height:16px;stroke-width:2}
.btn.primary{background:var(--primary);border-color:var(--primary);color:var(--primary-ink)}
.btn.primary:hover{filter:brightness(1.06)}
.btn.ghost{background:none;border-color:transparent}
.btn.danger{color:var(--red);border-color:transparent}
.btn.danger:hover{background:color-mix(in srgb,var(--red) 12%,transparent)}
.btn.sm{padding:6px 10px;font-size:13px;border-radius:8px}
.content{padding:20px;max-width:1180px;width:100%;margin:0 auto;flex:1}

/* mobile top / bottom nav */
.menu-btn{display:none}
.bottomnav{display:none}

/* ===================== COMPONENTS ===================== */
.grid{display:grid;gap:14px}
.kpis{grid-template-columns:repeat(4,1fr)}
.card{background:var(--surface);border:1px solid var(--hair);border-radius:var(--radius);box-shadow:var(--shadow)}
.card.pad{padding:16px}
.kpi{padding:15px 16px;display:flex;flex-direction:column;gap:3px;position:relative;overflow:hidden}
.kpi .lbl{font-size:12px;color:var(--muted-2);font-weight:600;letter-spacing:.02em;text-transform:uppercase}
.kpi .val{font-size:26px;font-weight:750;letter-spacing:-.02em;line-height:1.1}
.kpi .delta{font-size:12px;color:var(--muted);margin-top:2px}
.kpi .ic{position:absolute;right:14px;top:14px;width:30px;height:30px;border-radius:9px;display:grid;place-items:center;
  background:var(--primary-soft);color:var(--primary)}
.kpi .ic svg{width:17px;height:17px;stroke-width:2}

.section-h{display:flex;align-items:center;gap:10px;margin:22px 2px 12px}
.section-h h2{font-size:16px;margin:0;font-weight:700}
.section-h .spacer{flex:1}

.chip{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:650;padding:3px 10px;border-radius:999px;
  border:1px solid transparent;white-space:nowrap}
.chip .dot{width:7px;height:7px;border-radius:50%}
.st-orcamento{background:color-mix(in srgb,var(--st-orcamento) 14%,transparent);color:var(--st-orcamento)}
.st-aguardando{background:color-mix(in srgb,var(--st-aguardando) 16%,transparent);color:var(--st-aguardando)}
.st-em_servico{background:color-mix(in srgb,var(--st-em_servico) 16%,transparent);color:var(--st-em_servico)}
.st-pronto{background:color-mix(in srgb,var(--st-pronto) 14%,transparent);color:var(--st-pronto)}
.st-entregue{background:color-mix(in srgb,var(--st-entregue) 15%,transparent);color:var(--st-entregue)}
.st-recusado{background:color-mix(in srgb,var(--st-recusado) 14%,transparent);color:var(--st-recusado)}

/* table */
.table-wrap{overflow-x:auto;border-radius:var(--radius)}
table.tbl{width:100%;border-collapse:collapse;font-size:14px}
table.tbl th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted-2);
  font-weight:700;padding:11px 14px;border-bottom:1px solid var(--hair);white-space:nowrap}
table.tbl td{padding:12px 14px;border-bottom:1px solid var(--hair);vertical-align:middle}
table.tbl tr:last-child td{border-bottom:none}
table.tbl tbody tr:hover,table.tbl tr.click:hover{background:var(--surface-2);cursor:pointer}
.muted{color:var(--muted)}
.mono{font-variant-numeric:tabular-nums}
.right{text-align:right}
.pill-veh{font-size:12px;color:var(--muted);background:var(--surface-2);border:1px solid var(--hair);
  padding:2px 8px;border-radius:6px;font-weight:600;display:inline-block}

/* filters */
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.fchip{border:1px solid var(--hair);background:var(--surface);color:var(--muted);padding:6px 12px;border-radius:999px;
  font-size:13px;font-weight:600}
.fchip.active{background:var(--ink);color:var(--surface);border-color:var(--ink)}
.seg{display:inline-flex;border:1px solid var(--hair);border-radius:9px;overflow:hidden;background:var(--surface)}
.seg button{border:none;background:none;padding:7px 12px;font-size:13px;font-weight:600;color:var(--muted)}
.seg button.active{background:var(--primary);color:#fff}

/* kanban */
.kanban{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(250px,1fr);gap:12px;overflow-x:auto;padding-bottom:6px}
.kcol{background:var(--surface-2);border:1px solid var(--hair);border-radius:var(--radius);padding:10px;min-height:120px;display:flex;flex-direction:column;gap:9px}
.kcol.drop{outline:2px dashed var(--primary);outline-offset:-3px}
.kcol-h{display:flex;align-items:center;gap:8px;padding:2px 4px 4px;font-size:13px;font-weight:700}
.kcol-h .count{margin-left:auto;font-size:12px;color:var(--muted-2);background:var(--surface);border:1px solid var(--hair);
  border-radius:999px;padding:1px 8px}
.kcol-h .bar{width:8px;height:8px;border-radius:2px}
.kcard{background:var(--surface);border:1px solid var(--hair);border-radius:11px;padding:11px;box-shadow:var(--shadow);
  cursor:grab;display:flex;flex-direction:column;gap:6px}
.kcard:active{cursor:grabbing}
.kcard.dragging{opacity:.5}
.kcard .knum{font-size:12px;color:var(--muted-2);font-weight:700}
.kcard .kcli{font-weight:650;font-size:14px}
.kcard .kmeta{display:flex;align-items:center;gap:8px;justify-content:space-between}
.kcard .ktot{font-weight:700;font-variant-numeric:tabular-nums}

/* forms / modal */
.modal-back{position:fixed;inset:0;background:rgba(10,15,25,.5);backdrop-filter:blur(3px);z-index:60;display:flex;
  align-items:flex-end;justify-content:center;padding:0}
@media(min-width:721px){.modal-back{align-items:center;padding:24px}}
.modal{background:var(--surface);border:1px solid var(--hair);width:100%;max-width:640px;max-height:94vh;overflow:auto;
  border-radius:18px 18px 0 0;box-shadow:0 -10px 40px rgba(0,0,0,.25)}
@media(min-width:721px){.modal{border-radius:18px}}
.modal.wide{max-width:820px}
.modal-h{position:sticky;top:0;background:var(--surface);display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--hair);z-index:2}
.modal-h h3{margin:0;font-size:17px;font-weight:700}
.modal-h .x{margin-left:auto;border:none;background:var(--surface-2);width:32px;height:32px;border-radius:8px;color:var(--muted);font-size:18px;display:grid;place-items:center}
.modal-b{padding:18px}
.modal-f{position:sticky;bottom:0;background:var(--surface);border-top:1px solid var(--hair);padding:13px 18px;display:flex;gap:10px;justify-content:flex-end}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.field label{font-size:12.5px;font-weight:650;color:var(--muted)}
.field input,.field select,.field textarea{
  border:1px solid var(--hair);background:var(--surface-2);color:var(--ink);border-radius:9px;padding:10px 11px;width:100%;outline:none;transition:.12s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--primary);background:var(--surface);box-shadow:0 0 0 3px var(--primary-soft)}
.field textarea{resize:vertical;min-height:64px}
.frow{display:grid;gap:12px}
.frow.c2{grid-template-columns:1fr 1fr}
.frow.c3{grid-template-columns:1fr 1fr 1fr}
.hint{font-size:12px;color:var(--muted-2)}

/* itens editor */
.items{display:flex;flex-direction:column;gap:8px}
.item-row{display:grid;grid-template-columns:1fr 64px 108px 32px;gap:8px;align-items:center}
.item-row .t{font-size:11px;font-weight:700;text-transform:uppercase;color:var(--muted-2)}
.item-row input{padding:8px 9px}
.item-row .del{border:none;background:none;color:var(--muted-2);font-size:18px}
.add-line{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.tot-box{margin-top:14px;border-top:1px dashed var(--hair);padding-top:12px;display:flex;flex-direction:column;gap:6px}
.tot-box .l{display:flex;justify-content:space-between;font-size:14px}
.tot-box .l.big{font-size:18px;font-weight:750}

/* detail */
.det-head{display:flex;flex-wrap:wrap;gap:10px 18px;align-items:center;margin-bottom:6px}
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 18px;margin:12px 0}
.det-grid .k{font-size:12px;color:var(--muted-2);font-weight:600}
.det-grid .v{font-weight:600}
.timeline{display:flex;flex-direction:column;gap:0;margin-top:6px}
.tl{display:flex;gap:10px;font-size:13px;padding:5px 0}
.tl .tdot{width:9px;height:9px;border-radius:50%;background:var(--primary);margin-top:5px;flex:none}
.tl .tt{color:var(--muted-2);font-size:12px}

.empty{text-align:center;color:var(--muted-2);padding:46px 20px}
.empty svg{width:40px;height:40px;opacity:.5;margin-bottom:10px}
.alert{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:11px;font-size:13.5px;font-weight:600}
.alert.warn{background:color-mix(in srgb,var(--amber) 13%,transparent);color:var(--amber)}
.alert.info{background:var(--primary-soft);color:var(--primary)}
.alert svg{width:18px;height:18px;flex:none}

.search{position:relative;flex:1;max-width:320px}
.search input{width:100%;border:1px solid var(--hair);background:var(--surface);border-radius:10px;padding:9px 12px 9px 34px;color:var(--ink)}
.search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--muted-2)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--surface);
  padding:12px 20px;border-radius:11px;font-weight:600;font-size:14px;opacity:0;transition:.25s;z-index:100;box-shadow:var(--shadow);pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.bars{display:flex;align-items:flex-end;gap:9px;height:120px;padding-top:8px}
.bars .b{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;min-width:0}
.bars .b .col{width:100%;max-width:38px;background:var(--primary);border-radius:6px 6px 3px 3px;transition:.2s;min-height:3px}
.bars .b .cap{font-size:11px;color:var(--muted-2);white-space:nowrap}
.bars .b .amt{font-size:11px;font-weight:700;font-variant-numeric:tabular-nums}

/* ===================== RESPONSIVE ===================== */
@media (max-width:960px){
  .app{grid-template-columns:1fr}
  .sidebar{display:none}
  .menu-btn{display:inline-grid}
  .kpis{grid-template-columns:repeat(2,1fr)}
}
@media (max-width:720px){
  .content{padding:14px 14px 88px}
  .topbar{padding:11px 14px}
  .topbar h1{font-size:17px}
  .kpis{grid-template-columns:repeat(2,1fr)}
  .kpi .val{font-size:22px}
  .hide-sm{display:none !important}
  .bottomnav{
    display:flex;position:fixed;bottom:0;left:0;right:0;z-index:40;background:var(--surface);
    border-top:1px solid var(--hair);padding:6px 6px calc(6px + env(safe-area-inset-bottom));justify-content:space-around}
  .bottomnav button{border:none;background:none;color:var(--muted-2);display:flex;flex-direction:column;align-items:center;gap:3px;
    font-size:10.5px;font-weight:600;padding:5px 8px;border-radius:9px;flex:1}
  .bottomnav button svg{width:21px;height:21px;stroke-width:1.9}
  .bottomnav button.active{color:var(--primary)}
  .frow.c2,.frow.c3{grid-template-columns:1fr}
  .det-grid{grid-template-columns:1fr}
  .item-row{grid-template-columns:1fr 52px 92px 28px;gap:6px}
  .fab{position:fixed;right:16px;bottom:calc(70px + env(safe-area-inset-bottom));z-index:45;width:54px;height:54px;border-radius:16px;
    background:var(--primary);color:#fff;border:none;display:grid;place-items:center;box-shadow:0 6px 20px rgba(47,107,214,.45)}
  .fab svg{width:26px;height:26px;stroke-width:2.2}
}
.fab{display:none}
@media (max-width:720px){.fab.show{display:grid}}

/* drawer (mobile menu) */
.drawer-back{position:fixed;inset:0;background:rgba(10,15,25,.45);z-index:50;display:none}
.drawer-back.open{display:block}
.drawer{position:fixed;top:0;left:0;bottom:0;width:250px;background:var(--surface);border-right:1px solid var(--hair);
  z-index:51;transform:translateX(-100%);transition:.22s;padding:16px 12px;display:flex;flex-direction:column;gap:4px}
.drawer.open{transform:translateX(0)}

/* print */
@media print{
  .sidebar,.topbar,.bottomnav,.fab,.drawer,.drawer-back,.modal-f,.modal-h .x{display:none !important}
  body{background:#fff}
  .modal-back{position:static;background:none;padding:0;backdrop-filter:none}
  .modal{max-width:100%;box-shadow:none;border:none;max-height:none}
}
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR (desktop/tablet) -->
  <aside class="sidebar">
    <div class="brand">
      <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg></div>
      <div class="txt"><b>Oficina</b><span>Gestão de serviços</span></div>
    </div>
    <nav class="nav" id="navDesk"></nav>
    <div class="side-foot">
      <div class="row">
        <button class="mini-btn" data-act="theme"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>Tema</button>
        <button class="mini-btn" data-act="reset"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9 9 0 0 0-6.4 2.6L3 8"/><path d="M3 3v5h5"/></svg>Zerar</button>
      </div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="btn ghost menu-btn" data-act="drawer" style="padding:8px"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
      <div><h1 id="pageTitle">Painel</h1><div class="sub" id="pageSub"></div></div>
      <div class="spacer"></div>
      <button class="btn primary" data-act="nova-os"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg><span class="hide-sm">Nova OS</span></button>
    </div>
    <div class="content" id="view"></div>
  </div>
</div>

<!-- mobile bottom nav -->
<nav class="bottomnav" id="navMob"></nav>
<button class="fab" data-act="nova-os"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg></button>

<!-- mobile drawer -->
<div class="drawer-back" id="drawerBack" data-act="drawer-close"></div>
<aside class="drawer" id="drawer">
  <div class="brand"><div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg></div><div class="txt"><b>Oficina</b><span>Gestão de serviços</span></div></div>
  <nav class="nav" id="navDrawer"></nav>
  <div class="side-foot" style="margin-top:auto">
    <div class="row">
      <button class="mini-btn" data-act="theme">Tema</button>
      <button class="mini-btn" data-act="reset">Zerar</button>
    </div>
  </div>
</aside>

<div id="modalRoot"></div>
<div class="toast" id="toast"></div>

<script>
/* =========================================================================
   OFICINA — app de gestão de serviços (single-file, dados no localStorage)
   Módulos: OS (entrada/saída) · Orçamento→aprovação · Clientes+histórico ·
   Estoque de peças (baixa automática) · Kanban · Financeiro em ¥ ienes.
   ========================================================================= */
const $ = s=>document.querySelector(s);
const uid = ()=> (crypto.randomUUID?crypto.randomUUID():Date.now()+'-'+Math.random().toString(36).slice(2,8));
const yen = n=> '¥'+Math.round(n||0).toLocaleString('en-US');
const nowISO = ()=> new Date().toISOString();
const fmtDate = iso=>{ if(!iso) return '—'; const d=new Date(iso); return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'}); };
const fmtDateTime = iso=>{ if(!iso) return '—'; const d=new Date(iso); return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); };
const esc = s=> (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

const STATUS={
  orcamento:{label:'Orçamento',color:'var(--st-orcamento)'},
  aguardando:{label:'Aguardando',color:'var(--st-aguardando)'},
  em_servico:{label:'Em serviço',color:'var(--st-em_servico)'},
  pronto:{label:'Pronto',color:'var(--st-pronto)'},
  entregue:{label:'Entregue',color:'var(--st-entregue)'},
  recusado:{label:'Recusado',color:'var(--st-recusado)'},
};
const KANBAN=['orcamento','aguardando','em_servico','pronto','entregue'];
const COMB=['Gasolina','Diesel','Híbrido','Elétrico','Flex','GNV'];

/* ---------------- persistência ---------------- */
const KEY='oficina_db_v1';
let DB={clientes:[],veiculos:[],pecas:[],ordens:[],seq:1,theme:''};
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(DB)); }catch(e){} }
function load(){ try{ const r=localStorage.getItem(KEY); if(r){ DB=JSON.parse(r); return true; } }catch(e){} return false; }

/* ---------------- dados de exemplo ---------------- */
function seed(){
  DB={clientes:[],veiculos:[],pecas:[],ordens:[],seq:1,theme:''};
  const c1=addCliente({nome:'Kenji Tanaka',telefone:'090-1234-5678',email:'kenji@mail.jp',obs:''});
  const c2=addCliente({nome:'Marina Alves',telefone:'080-9876-5432',email:'',obs:'Cliente antiga'});
  const c3=addCliente({nome:'Auto Runner K.K.',telefone:'03-5555-0101',email:'frota@runner.jp',obs:'Frota — 6 veículos'});
  const v1=addVeiculo({clienteId:c1.id,placa:'品川 300 あ 12-34',marca:'Toyota',modelo:'Corolla',ano:2019,combustivel:'Híbrido',km:78500});
  const v2=addVeiculo({clienteId:c2.id,placa:'横浜 500 さ 88-01',marca:'Honda',modelo:'Fit',ano:2016,combustivel:'Gasolina',km:112300});
  const v3=addVeiculo({clienteId:c3.id,placa:'足立 800 む 45-67',marca:'Nissan',modelo:'NV350',ano:2021,combustivel:'Diesel',km:64200});
  const p1=addPeca({nome:'Óleo 5W-30 (1L)',sku:'OIL-530',preco:1800,custo:1100,qtd:24,min:6});
  const p2=addPeca({nome:'Filtro de óleo',sku:'FLT-OIL',preco:1500,custo:800,qtd:5,min:8});
  const p3=addPeca({nome:'Pastilha de freio diant.',sku:'BRK-FRT',preco:9800,custo:6200,qtd:10,min:4});
  const p4=addPeca({nome:'Bateria 40B19L',sku:'BAT-40',preco:12800,custo:8900,qtd:3,min:3});
  // OS de exemplo em vários status
  mkOS(c1,v1,'entregue',[{tipo:'mao',desc:'Troca de óleo + filtro',qtd:1,preco:3500},{tipo:'peca',ref:p1,qtd:4},{tipo:'peca',ref:p2,qtd:1}], -12);
  mkOS(c2,v2,'em_servico',[{tipo:'mao',desc:'Troca de pastilhas + sangria',qtd:1,preco:8000},{tipo:'peca',ref:p3,qtd:1}], -1);
  mkOS(c3,v3,'aguardando',[{tipo:'mao',desc:'Revisão 60.000km',qtd:1,preco:22000},{tipo:'peca',ref:p1,qtd:6}], 0);
  mkOS(c1,v1,'orcamento',[{tipo:'mao',desc:'Troca de bateria',qtd:1,preco:2500},{tipo:'peca',ref:p4,qtd:1}], 0);
  DB.theme=''; save();
}
function mkOS(c,v,status,rawItems,daysAgo){
  const itens=rawItems.map(it=> it.tipo==='peca'
    ? {id:uid(),tipo:'peca',pecaId:it.ref.id,desc:it.ref.nome,qtd:it.qtd,preco:it.ref.preco,custo:it.ref.custo}
    : {id:uid(),tipo:'mao',desc:it.desc,qtd:it.qtd,preco:it.preco,custo:0});
  const criado=new Date(Date.now()+ (daysAgo*86400000)).toISOString();
  const o={id:uid(),numero:DB.seq++,clienteId:c.id,veiculoId:v.id,status,tipo:(status==='orcamento'?'orcamento':'os'),
    kmEntrada:v.km,previsao:new Date(Date.now()+2*86400000).toISOString().slice(0,10),obs:'',desconto:0,
    itens,criadoEm:criado,entregueEm:(status==='entregue'?criado:null),consumido:false,
    hist:[{t:criado,txt:'OS criada'}]};
  if(status==='entregue'){ o.hist.push({t:criado,txt:'Entregue ao cliente'}); }
  DB.ordens.push(o);
  if(status==='entregue') consumeStock(o);
}

/* ---------------- CRUD helpers ---------------- */
function addCliente(d){ const c={id:uid(),...d,criadoEm:nowISO()}; DB.clientes.push(c); return c; }
function addVeiculo(d){ const v={id:uid(),...d}; DB.veiculos.push(v); return v; }
function addPeca(d){ const p={id:uid(),...d}; DB.pecas.push(p); return p; }
const cliente = id=> DB.clientes.find(c=>c.id===id);
const veiculo = id=> DB.veiculos.find(v=>v.id===id);
const peca = id=> DB.pecas.find(p=>p.id===id);
const veiculosDe = cid=> DB.veiculos.filter(v=>v.clienteId===cid);
const ordensDe = cid=> DB.ordens.filter(o=>o.clienteId===cid);

/* ---------------- cálculos ---------------- */
const totalItens = o=> o.itens.reduce((s,i)=>s + (i.qtd*i.preco),0);
const total = o=> Math.max(0, totalItens(o) - (o.desconto||0));
const custoOS = o=> o.itens.reduce((s,i)=>s + (i.qtd*(i.custo||0)),0);
// estoque reservado = peças em OS ativas (não entregue/recusado) ainda não consumidas
function reservado(pecaId){
  let r=0;
  for(const o of DB.ordens){ if(o.consumido) continue; if(o.status==='entregue'||o.status==='recusado') continue;
    for(const it of o.itens){ if(it.tipo==='peca'&&it.pecaId===pecaId) r+=it.qtd; } }
  return r;
}
const disponivel = p=> p.qtd - reservado(p.id);
function consumeStock(o){ if(o.consumido) return; for(const it of o.itens){ if(it.tipo==='peca'){ const p=peca(it.pecaId); if(p) p.qtd=Math.max(0,p.qtd-it.qtd); } } o.consumido=true; }
function restoreStock(o){ if(!o.consumido) return; for(const it of o.itens){ if(it.tipo==='peca'){ const p=peca(it.pecaId); if(p) p.qtd+=it.qtd; } } o.consumido=false; }

function setStatus(o,st){
  if(o.status===st) return;
  const prev=o.status; o.status=st; o.tipo = st==='orcamento'?'orcamento':'os';
  if(st==='entregue'){ o.entregueEm=nowISO(); consumeStock(o); }
  else if(prev==='entregue'){ o.entregueEm=null; restoreStock(o); }
  o.hist.push({t:nowISO(),txt:'Status → '+STATUS[st].label});
  save();
}

/* período p/ financeiro */
function inPeriod(iso,period){
  if(!iso) return false; const d=new Date(iso), n=new Date();
  if(period==='mes') return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();
  if(period==='mespass'){ const m=new Date(n.getFullYear(),n.getMonth()-1,1); return d.getMonth()===m.getMonth()&&d.getFullYear()===m.getFullYear(); }
  if(period==='ano') return d.getFullYear()===n.getFullYear();
  return true;
}

/* =========================================================================
   NAVEGAÇÃO / ROTEADOR
   ========================================================================= */
const NAV=[
  {id:'painel',label:'Painel',icon:'M3 12l9-9 9 9M5 10v10h14V10'},
  {id:'ordens',label:'Ordens',icon:'M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2M9 12h6M9 16h4'},
  {id:'clientes',label:'Clientes',icon:'M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 7a4 4 0 1 0 0 .01M23 21v-2a4 4 0 0 0-3-3.87'},
  {id:'estoque',label:'Estoque',icon:'M21 8v13H3V8M1 3h22v5H1zM10 12h4'},
  {id:'financeiro',label:'Financeiro',icon:'M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6'},
];
let route='painel';
let uiState={ordFilter:'todos',ordView:'lista',finPeriod:'mes',cliSearch:''};

function icon(path){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="'+path+'"/></svg>'; }
function buildNav(){
  const pend = DB.ordens.filter(o=>o.status==='orcamento').length;
  const deskHTML = NAV.map(n=>`<button data-nav="${n.id}" class="${route===n.id?'active':''}">${icon(n.icon)}<span>${n.label}</span>${n.id==='ordens'&&pend?`<span class="badge">${pend}</span>`:''}</button>`).join('');
  $('#navDesk').innerHTML=deskHTML; $('#navDrawer').innerHTML=deskHTML;
  $('#navMob').innerHTML = NAV.map(n=>`<button data-nav="${n.id}" class="${route===n.id?'active':''}">${icon(n.icon)}<span>${n.label}</span></button>`).join('');
}
function go(r){ route=r; closeDrawer(); render(); }

/* =========================================================================
   RENDER
   ========================================================================= */
const TITLES={painel:['Painel','Visão geral da oficina'],ordens:['Ordens de Serviço','Entrada e saída de serviços'],clientes:['Clientes','Cadastro e histórico'],estoque:['Estoque','Peças e disponibilidade'],financeiro:['Financeiro','Resultados em ienes (¥)']};
function render(){
  buildNav();
  const [t,s]=TITLES[route]; $('#pageTitle').textContent=t; $('#pageSub').textContent=s;
  $('.fab')?.classList.toggle('show', route!=='painel');
  const v=$('#view');
  if(route==='painel') v.innerHTML=viewPainel();
  else if(route==='ordens') v.innerHTML=viewOrdens();
  else if(route==='clientes') v.innerHTML=viewClientes();
  else if(route==='estoque') v.innerHTML=viewEstoque();
  else if(route==='financeiro') v.innerHTML=viewFinanceiro();
  if(route==='ordens'&&uiState.ordView==='kanban') wireKanban();
}

/* ---------- PAINEL ---------- */
function viewPainel(){
  const ord=DB.ordens;
  const abertas=ord.filter(o=>['aguardando','em_servico','pronto'].includes(o.status));
  const entregMes=ord.filter(o=>o.status==='entregue'&&inPeriod(o.entregueEm,'mes'));
  const fatMes=entregMes.reduce((s,o)=>s+total(o),0);
  const ticket=entregMes.length?fatMes/entregMes.length:0;
  const orc=ord.filter(o=>o.status==='orcamento');
  const baixo=DB.pecas.filter(p=>disponivel(p)<=p.min);
  const recent=[...ord].sort((a,b)=>new Date(b.criadoEm)-new Date(a.criadoEm)).slice(0,6);
  const kpi=(lbl,val,ic,delta)=>`<div class="card kpi"><span class="lbl">${lbl}</span><span class="val tnum">${val}</span>${delta?`<span class="delta">${delta}</span>`:''}<span class="ic">${icon(ic)}</span></div>`;
  let alerts='';
  if(orc.length) alerts+=`<div class="alert info" data-nav="ordens" style="cursor:pointer">${icon('M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zM12 8v4M12 16h.01')}${orc.length} orçamento(s) aguardando aprovação do cliente</div>`;
  if(baixo.length) alerts+=`<div class="alert warn" data-nav="estoque" style="cursor:pointer">${icon('M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4M12 17h.01')}Estoque baixo: ${baixo.map(p=>esc(p.nome)).join(', ')}</div>`;
  return `
  <div class="grid kpis">
    ${kpi('Faturamento (mês)',yen(fatMes),'M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6')}
    ${kpi('OS em aberto',abertas.length,'M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2')}
    ${kpi('Entregues (mês)',entregMes.length,'M20 6 9 17l-5-5')}
    ${kpi('Ticket médio',yen(ticket),'M3 3v18h18M7 14l3-3 3 3 5-6')}
  </div>
  ${alerts?`<div class="grid" style="margin-top:14px">${alerts}</div>`:''}
  <div class="section-h"><h2>Ordens recentes</h2><div class="spacer"></div><button class="btn sm ghost" data-nav="ordens">Ver todas</button></div>
  ${recent.length?osTable(recent):emptyBox('Nenhuma ordem ainda','Crie a primeira OS no botão “Nova OS”.')}
  `;
}

/* ---------- tabela de OS ---------- */
function statusChip(st){ return `<span class="chip st-${st}"><span class="dot" style="background:${STATUS[st].color}"></span>${STATUS[st].label}</span>`; }
function osTable(list){
  return `<div class="card table-wrap"><table class="tbl"><thead><tr>
    <th>OS</th><th>Cliente</th><th class="hide-sm">Veículo</th><th>Status</th><th class="right">Total</th><th class="right hide-sm">Entrada</th>
  </tr></thead><tbody>
  ${list.map(o=>{ const c=cliente(o.clienteId), v=veiculo(o.veiculoId);
    return `<tr class="click" data-os="${o.id}">
      <td class="mono">#${String(o.numero).padStart(4,'0')}</td>
      <td><b>${esc(c?.nome||'—')}</b></td>
      <td class="hide-sm"><span class="pill-veh">${esc(v?(v.marca+' '+v.modelo):'—')}</span></td>
      <td>${statusChip(o.status)}</td>
      <td class="right mono"><b>${yen(total(o))}</b></td>
      <td class="right mono muted hide-sm">${fmtDate(o.criadoEm)}</td>
    </tr>`; }).join('')}
  </tbody></table></div>`;
}

/* ---------- ORDENS ---------- */
function viewOrdens(){
  const f=uiState.ordFilter;
  let list=[...DB.ordens].sort((a,b)=>new Date(b.criadoEm)-new Date(a.criadoEm));
  if(f!=='todos') list=list.filter(o=>o.status===f);
  const counts={}; DB.ordens.forEach(o=>counts[o.status]=(counts[o.status]||0)+1);
  const fchip=(id,lbl)=>`<button class="fchip ${uiState.ordFilter===id?'active':''}" data-filter="${id}">${lbl}${counts[id]?` · ${counts[id]}`:''}</button>`;
  const filters=`<div class="filters">
    <button class="fchip ${f==='todos'?'active':''}" data-filter="todos">Todos · ${DB.ordens.length}</button>
    ${Object.keys(STATUS).map(k=>fchip(k,STATUS[k].label)).join('')}
    <div class="spacer" style="flex:1"></div>
    <div class="seg"><button class="${uiState.ordView==='lista'?'active':''}" data-view="lista">Lista</button><button class="${uiState.ordView==='kanban'?'active':''}" data-view="kanban">Kanban</button></div>
  </div>`;
  if(uiState.ordView==='kanban') return filters+'<div style="height:12px"></div>'+kanbanHTML();
  return filters+'<div style="height:14px"></div>'+(list.length?osTable(list):emptyBox('Nada por aqui','Nenhuma OS com esse filtro.'));
}
function kanbanHTML(){
  return `<div class="kanban">${KANBAN.map(st=>{
    const items=DB.ordens.filter(o=>o.status===st).sort((a,b)=>new Date(b.criadoEm)-new Date(a.criadoEm));
    return `<div class="kcol" data-col="${st}">
      <div class="kcol-h"><span class="bar" style="background:${STATUS[st].color}"></span>${STATUS[st].label}<span class="count">${items.length}</span></div>
      ${items.map(o=>{ const c=cliente(o.clienteId), v=veiculo(o.veiculoId);
        return `<div class="kcard" draggable="true" data-os="${o.id}">
          <div class="knum">#${String(o.numero).padStart(4,'0')} · ${fmtDate(o.criadoEm)}</div>
          <div class="kcli">${esc(c?.nome||'—')}</div>
          <div class="kmeta"><span class="pill-veh">${esc(v?(v.marca+' '+v.modelo):'—')}</span><span class="ktot mono">${yen(total(o))}</span></div>
        </div>`; }).join('')}
    </div>`;
  }).join('')}</div>`;
}
let dragId=null;
function wireKanban(){
  document.querySelectorAll('.kcard').forEach(el=>{
    el.addEventListener('dragstart',e=>{ dragId=el.dataset.os; el.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
    el.addEventListener('dragend',()=>{ el.classList.remove('dragging'); dragId=null; document.querySelectorAll('.kcol').forEach(c=>c.classList.remove('drop')); });
  });
  document.querySelectorAll('.kcol').forEach(col=>{
    col.addEventListener('dragover',e=>{ e.preventDefault(); col.classList.add('drop'); });
    col.addEventListener('dragleave',()=>col.classList.remove('drop'));
    col.addEventListener('drop',e=>{ e.preventDefault(); const st=col.dataset.col; if(dragId){ const o=DB.ordens.find(x=>x.id===dragId); if(o){ setStatus(o,st); toast('OS movida p/ '+STATUS[st].label); render(); } } });
  });
}

/* ---------- CLIENTES ---------- */
function viewClientes(){
  const q=uiState.cliSearch.toLowerCase();
  let list=DB.clientes.filter(c=>!q||c.nome.toLowerCase().includes(q)||(c.telefone||'').includes(q));
  const search=`<div style="display:flex;gap:10px;align-items:center;margin-bottom:14px">
    <div class="search">${icon('M21 21l-4.3-4.3M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16z')}<input id="cliSearch" placeholder="Buscar cliente…" value="${esc(uiState.cliSearch)}"></div>
    <div class="spacer" style="flex:1"></div>
    <button class="btn primary" data-act="novo-cliente"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg><span class="hide-sm">Novo cliente</span></button>
  </div>`;
  if(!list.length) return search+emptyBox('Sem clientes','Cadastre seu primeiro cliente.');
  return search+`<div class="card table-wrap"><table class="tbl"><thead><tr>
    <th>Nome</th><th class="hide-sm">Telefone</th><th>Veículos</th><th class="right">OS</th><th class="right hide-sm">Gasto total</th>
  </tr></thead><tbody>${list.map(c=>{
    const vs=veiculosDe(c.id), os=ordensDe(c.id), gasto=os.filter(o=>o.status==='entregue').reduce((s,o)=>s+total(o),0);
    return `<tr class="click" data-cli="${c.id}"><td><b>${esc(c.nome)}</b><div class="hide-sm" style="font-size:12px;color:var(--muted-2)">${esc(c.email||'')}</div></td>
      <td class="hide-sm mono">${esc(c.telefone||'—')}</td>
      <td>${vs.length?vs.map(v=>`<span class="pill-veh">${esc(v.marca+' '+v.modelo)}</span>`).join(' '):'<span class="muted">—</span>'}</td>
      <td class="right mono">${os.length}</td>
      <td class="right mono hide-sm"><b>${yen(gasto)}</b></td></tr>`;
  }).join('')}</tbody></table></div>`;
}

/* ---------- ESTOQUE ---------- */
function viewEstoque(){
  const head=`<div style="display:flex;gap:10px;align-items:center;margin-bottom:14px">
    <div class="muted" style="font-size:13px">${DB.pecas.length} peça(s) cadastrada(s)</div><div class="spacer" style="flex:1"></div>
    <button class="btn primary" data-act="nova-peca"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg><span class="hide-sm">Nova peça</span></button></div>`;
  if(!DB.pecas.length) return head+emptyBox('Estoque vazio','Cadastre peças para usar nas OS.');
  return head+`<div class="card table-wrap"><table class="tbl"><thead><tr>
    <th>Peça</th><th class="hide-sm">SKU</th><th class="right">Preço</th><th class="right hide-sm">Custo</th><th class="right">Estoque</th><th class="right">Disp.</th>
  </tr></thead><tbody>${DB.pecas.map(p=>{
    const disp=disponivel(p), low=disp<=p.min;
    return `<tr class="click" data-peca="${p.id}"><td><b>${esc(p.nome)}</b></td>
      <td class="hide-sm mono muted">${esc(p.sku||'—')}</td>
      <td class="right mono">${yen(p.preco)}</td>
      <td class="right mono muted hide-sm">${yen(p.custo)}</td>
      <td class="right mono">${p.qtd}</td>
      <td class="right mono"><span class="chip ${low?'st-recusado':'st-entregue'}" style="padding:2px 9px">${disp}${low?' ⚠':''}</span></td></tr>`;
  }).join('')}</tbody></table></div>
  <p class="hint" style="margin-top:10px">“Disp.” = estoque menos o que já está reservado em OS abertas. A baixa definitiva acontece ao entregar a OS.</p>`;
}

/* ---------- FINANCEIRO ---------- */
function viewFinanceiro(){
  const per=uiState.finPeriod;
  const entregues=DB.ordens.filter(o=>o.status==='entregue'&&inPeriod(o.entregueEm,per));
  const fat=entregues.reduce((s,o)=>s+total(o),0);
  const custoPec=entregues.reduce((s,o)=>s+custoOS(o),0);
  const maoObra=entregues.reduce((s,o)=>s+o.itens.filter(i=>i.tipo==='mao').reduce((a,i)=>a+i.qtd*i.preco,0),0);
  const pecasFat=entregues.reduce((s,o)=>s+o.itens.filter(i=>i.tipo==='peca').reduce((a,i)=>a+i.qtd*i.preco,0),0);
  const lucro=fat-custoPec, margem=fat?Math.round(lucro/fat*100):0;
  const ticket=entregues.length?fat/entregues.length:0;
  const emAberto=DB.ordens.filter(o=>['aguardando','em_servico','pronto'].includes(o.status)).reduce((s,o)=>s+total(o),0);
  const perBtn=(id,lbl)=>`<button class="fchip ${per===id?'active':''}" data-period="${id}">${lbl}</button>`;
  const kpi=(lbl,val,delta,cls)=>`<div class="card kpi"><span class="lbl">${lbl}</span><span class="val tnum" ${cls?`style="color:${cls}"`:''}>${val}</span>${delta?`<span class="delta">${delta}</span>`:''}</div>`;
  // gráfico: faturamento últimos 6 meses
  const months=[]; const n=new Date();
  for(let i=5;i>=0;i--){ const d=new Date(n.getFullYear(),n.getMonth()-i,1); months.push(d); }
  const monthFat=months.map(d=>DB.ordens.filter(o=>o.status==='entregue'&&o.entregueEm&&new Date(o.entregueEm).getMonth()===d.getMonth()&&new Date(o.entregueEm).getFullYear()===d.getFullYear()).reduce((s,o)=>s+total(o),0));
  const maxF=Math.max(1,...monthFat);
  const chart=`<div class="card pad"><div style="font-size:13px;font-weight:700;margin-bottom:4px">Faturamento — últimos 6 meses</div>
    <div class="bars">${months.map((d,i)=>`<div class="b"><div class="amt">${monthFat[i]?yen(monthFat[i]).replace('¥','¥'):''}</div><div class="col" style="height:${Math.round(monthFat[i]/maxF*90)}%;background:${i===5?'var(--primary)':'color-mix(in srgb,var(--primary) 55%,var(--hair))'}"></div><div class="cap">${d.toLocaleDateString('pt-BR',{month:'short'})}</div></div>`).join('')}</div></div>`;
  return `<div class="filters" style="margin-bottom:14px">${perBtn('mes','Mês atual')}${perBtn('mespass','Mês passado')}${perBtn('ano','Ano')}${perBtn('tudo','Tudo')}</div>
  <div class="grid kpis">
    ${kpi('Faturamento',yen(fat))}
    ${kpi('Custo de peças',yen(custoPec))}
    ${kpi('Lucro bruto',yen(lucro),'margem '+margem+'%','var(--green)')}
    ${kpi('Ticket médio',yen(ticket))}
  </div>
  <div class="grid kpis" style="margin-top:14px">
    ${kpi('Mão de obra',yen(maoObra))}
    ${kpi('Peças (venda)',yen(pecasFat))}
    ${kpi('OS entregues',entregues.length)}
    ${kpi('A receber (aberto)',yen(emAberto),'não entregue ainda')}
  </div>
  <div style="height:14px"></div>${chart}
  <div class="section-h"><h2>Entregues no período</h2></div>
  ${entregues.length?osTable([...entregues].sort((a,b)=>new Date(b.entregueEm)-new Date(a.entregueEm))):emptyBox('Sem entregas','Nenhuma OS entregue neste período.')}`;
}

/* =========================================================================
   EVENTOS
   ========================================================================= */
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200); }
function openDrawer(){ $('#drawer').classList.add('open'); $('#drawerBack').classList.add('open'); }
function closeDrawer(){ $('#drawer').classList.remove('open'); $('#drawerBack').classList.remove('open'); }
function toggleTheme(){ const cur=document.documentElement.getAttribute('data-theme'); const next=cur==='dark'?'light':cur==='light'?'':'dark';
  if(next) document.documentElement.setAttribute('data-theme',next); else document.documentElement.removeAttribute('data-theme');
  DB.theme=next; save(); }

document.addEventListener('click',e=>{
  const nav=e.target.closest('[data-nav]'); if(nav){ go(nav.dataset.nav); return; }
  const t=e.target.closest('[data-act]');
  const back=e.target.closest('[data-modal-back]');
  if(back && (e.target===back || e.target.classList.contains('x') || e.target.classList.contains('modal-back') || back.classList.contains('btn'))){ if(!t){ closeModal(); return; } }

  // linhas clicáveis
  const osRow=e.target.closest('[data-os]'); if(osRow && !t){ modalDetalhe(osRow.dataset.os); return; }
  const cliRow=e.target.closest('[data-cli]'); if(cliRow && !t && !e.target.closest('.modal')){ modalCliDetalhe(cliRow.dataset.cli); return; }
  const pcRow=e.target.closest('[data-peca]'); if(pcRow && !t){ modalPeca(pcRow.dataset.peca); return; }

  if(!t) return;
  const act=t.dataset.act, id=t.dataset.id;
  switch(act){
    case 'drawer': openDrawer(); break;
    case 'drawer-close': closeDrawer(); break;
    case 'theme': toggleTheme(); break;
    case 'reset': if(confirm('Zerar todos os dados e recarregar os exemplos?')){ seed(); render(); toast('Dados de exemplo recarregados'); } break;
    case 'nova-os': modalOS(); break;
    case 'novo-cliente': modalCliente(); break;
    case 'nova-peca': modalPeca(); break;
    case 'save-cliente': saveCliente(); break;
    case 'save-peca': savePeca(id); break;
    case 'del-peca': if(confirm('Excluir esta peça?')){ DB.pecas=DB.pecas.filter(p=>p.id!==id); save(); closeModal(); render(); toast('Peça excluída'); } break;
    case 'save-os': saveOS(); break;
    case 'add-mao': osDraft.itens.push({id:uid(),tipo:'mao',desc:'',qtd:1,preco:0,custo:0}); refreshOSForm(); break;
    case 'rm-item': syncDraftInputs(); osDraft.itens.splice(+t.dataset.ix,1); refreshOSForm(); break;
    case 'set-status': break; // via change
    case 'edit-os': closeModal(); modalOS(id); break;
    case 'del-os': if(confirm('Excluir esta OS?')){ const o=DB.ordens.find(x=>x.id===id); if(o&&o.consumido) restoreStock(o); DB.ordens=DB.ordens.filter(x=>x.id!==id); save(); closeModal(); render(); toast('OS excluída'); } break;
    case 'print-os': window.print(); break;
    case 'del-cliente': if(confirm('Excluir cliente e seus veículos? (as OS permanecem)')){ DB.clientes=DB.clientes.filter(c=>c.id!==id); DB.veiculos=DB.veiculos.filter(v=>v.clienteId!==id); save(); closeModal(); render(); toast('Cliente excluído'); } break;
    case 'nova-os-cli': closeModal(); modalOS(); osDraft.clienteId=t.dataset.cli; refreshOSForm(); break;
    case 'novo-veiculo': syncDraftInputs&&syncDraftInputs(); modalVeiculo(t.dataset.cli||osDraft?.clienteId||'', osDraft?'reopen-os':'close'); break;
    case 'save-veiculo': saveVeiculo(t.dataset.cli, t.dataset.back); break;
    case 'close': closeModal(); if(osFormBack){ openModal(osFormHTML(),true); osFormBack=false; } break;
    case 'reopen-os': closeModal(); openModal(osFormHTML(),true); break;
  }
});

});
document.addEventListener('change',e=>{
  const ss=e.target.closest('[data-act="set-status"]'); if(ss){ const o=DB.ordens.find(x=>x.id===ss.dataset.id); if(o){ setStatus(o,e.target.value); render(); modalDetalhe(o.id); toast('Status atualizado'); } return; }
  if(e.target.id==='os_cli'){ syncDraftInputs(); osDraft.clienteId=e.target.value; osDraft.veiculoId=''; refreshOSForm(); return; }
  if(e.target.id==='os_veh'){ osDraft.veiculoId=e.target.value; const v=veiculo(e.target.value); if(v&&$('#os_km')&&!$('#os_km').value) $('#os_km').value=v.km||''; return; }
  if(e.target.id==='pecaPick'){ const p=peca(e.target.value); if(p){ syncDraftInputs(); osDraft.itens.push({id:uid(),tipo:'peca',pecaId:p.id,desc:p.nome,qtd:1,preco:p.preco,custo:p.custo}); refreshOSForm(); } return; }
  if(e.target.id==='cliSearch'){ uiState.cliSearch=e.target.value; }
});
document.addEventListener('input',e=>{
  if(e.target.id==='cliSearch'){ uiState.cliSearch=e.target.value; clearTimeout(window._cs); window._cs=setTimeout(()=>{ const v=$('#view'); v.innerHTML=viewClientes(); const inp=$('#cliSearch'); if(inp){ inp.focus(); inp.setSelectionRange(inp.value.length,inp.value.length); } },200); return; }
  // itens da OS
  const row=e.target.closest('.item-row'); if(row){ const ix=+row.dataset.ix, f=e.target.dataset.f, it=osDraft.itens[ix]; if(it){ if(f==='qtd') it.qtd=Math.max(1,+e.target.value||1); else if(f==='preco') it.preco=Math.max(0,+e.target.value||0); else it.desc=e.target.value; recalcOS(); } }
  if(e.target.id==='os_desc'){ osDraft.desconto=Math.max(0,+e.target.value||0); recalcOS(); }
});
function syncDraftInputs(){ // captura o que está digitado antes de re-render do form
  if(!osDraft) return;
  document.querySelectorAll('#itemsBox .item-row').forEach(row=>{ const ix=+row.dataset.ix, it=osDraft.itens[ix]; if(!it) return;
    const d=row.querySelector('[data-f="desc"]'), q=row.querySelector('[data-f="qtd"]'), p=row.querySelector('[data-f="preco"]');
    if(d) it.desc=d.value; if(q) it.qtd=Math.max(1,+q.value||1); if(p) it.preco=Math.max(0,+p.value||0); });
  if($('#os_tipo')) osDraft.tipo=$('#os_tipo').value;
  if($('#os_km')) osDraft.kmEntrada=$('#os_km').value;
  if($('#os_prev')) osDraft.previsao=$('#os_prev').value;
  if($('#os_desc')) osDraft.desconto=Math.max(0,+$('#os_desc').value||0);
  if($('#os_obs')) osDraft.obs=$('#os_obs').value;
}

/* ---- saves ---- */
function saveCliente(){ const nome=$('#cl_nome').value.trim(); if(!nome){ toast('Informe o nome'); return; }
  const c=addCliente({nome,telefone:$('#cl_tel').value.trim(),email:$('#cl_email').value.trim(),obs:$('#cl_obs').value.trim()});
  save(); closeModal(); toast('Cliente cadastrado');
  if(osDraft){ openModal(osFormHTML(),true); osDraft.clienteId=c.id; refreshOSForm(); } else render();
}
function savePeca(id){ const nome=$('#pc_nome').value.trim(); if(!nome){ toast('Informe o nome'); return; }
  const data={nome,sku:$('#pc_sku').value.trim(),qtd:+$('#pc_qtd').value||0,preco:+$('#pc_preco').value||0,custo:+$('#pc_custo').value||0,min:+$('#pc_min').value||0};
  if(id){ Object.assign(peca(id),data); } else addPeca(data);
  save(); closeModal(); render(); toast('Peça salva');
}
function saveVeiculo(cid,back){ const placa=$('#vh_placa').value.trim(); if(!placa){ toast('Informe a placa'); return; }
  const v=addVeiculo({clienteId:cid,placa,marca:$('#vh_marca').value.trim(),modelo:$('#vh_modelo').value.trim(),ano:+$('#vh_ano').value||'',combustivel:$('#vh_comb').value,km:+$('#vh_km').value||0});
  save(); closeModal(); toast('Veículo cadastrado');
  if(back==='reopen-os'&&osDraft){ osDraft.veiculoId=v.id; openModal(osFormHTML(),true); refreshOSForm(); }
  else render();
}
function saveOS(){ syncDraftInputs(); const d=osDraft;
  if(!d.clienteId){ toast('Selecione o cliente'); return; }
  if(!d.veiculoId){ toast('Selecione o veículo'); return; }
  if(!d.itens.length){ toast('Adicione ao menos um item'); return; }
  d.status = d.tipo==='orcamento' ? 'orcamento' : (d.status==='orcamento'?'aguardando':d.status);
  if(d.id){ const o=DB.ordens.find(x=>x.id===d.id); const wasConsumed=o.consumido; if(wasConsumed) restoreStock(o);
    Object.assign(o,{clienteId:d.clienteId,veiculoId:d.veiculoId,tipo:d.tipo,status:d.status,kmEntrada:d.kmEntrada,previsao:d.previsao,obs:d.obs,desconto:d.desconto,itens:d.itens});
    if(o.status==='entregue') consumeStock(o); o.hist.push({t:nowISO(),txt:'OS editada'}); toast('OS atualizada');
  } else {
    const o={id:uid(),numero:DB.seq++,clienteId:d.clienteId,veiculoId:d.veiculoId,tipo:d.tipo,status:d.status,kmEntrada:d.kmEntrada,previsao:d.previsao,obs:d.obs,desconto:d.desconto,itens:d.itens,criadoEm:nowISO(),entregueEm:null,consumido:false,hist:[{t:nowISO(),txt:d.tipo==='orcamento'?'Orçamento criado':'OS criada'}]};
    DB.ordens.push(o); toast(d.tipo==='orcamento'?'Orçamento criado':'OS criada');
  }
  osDraft=null; save(); closeModal(); render();
}

/* =========================================================================
   BOOT
   ========================================================================= */
if(!load()){ seed(); }
if(DB.theme) document.documentElement.setAttribute('data-theme',DB.theme);
render();
</script>
</body>
