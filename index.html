<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IB · BTC Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
  :root{
    --ink:#0a0d13;          /* fundo mais profundo */
    --panel:#111621;        /* barras e painéis */
    --panel-2:#0d121b;
    --hair:#1d2534;         /* hairlines / bordas */
    --hair-2:#283245;
    --txt:#e7ebf2;
    --muted:#7f8a9e;
    --muted-2:#586074;
    --bull:#26a69a;
    --bear:#ef5350;
    --btc:#f7931a;          /* laranja Bitcoin — cor-assinatura */
    --draw:#41b3ff;         /* cor dos desenhos do usuário */
    --draw-fill:rgba(65,179,255,.10);
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    background:var(--ink);
    color:var(--txt);
    font-family:"Space Grotesk",system-ui,sans-serif;
    display:flex;flex-direction:column;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:"IBM Plex Mono",ui-monospace,monospace}

  /* ---------- TOP BAR ---------- */
  header{
    height:52px;flex:0 0 52px;
    display:flex;align-items:center;gap:18px;
    padding:0 14px;
    background:linear-gradient(180deg,var(--panel),var(--panel-2));
    border-bottom:1px solid var(--hair);
    z-index:10;
  }
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;letter-spacing:.5px;font-size:14px}
  .brand .dot{width:9px;height:9px;border-radius:2px;background:var(--btc);box-shadow:0 0 10px var(--btc)}
  .brand small{color:var(--muted);font-weight:500;letter-spacing:.3px}

  .tfs{display:flex;gap:2px;background:var(--panel-2);border:1px solid var(--hair);border-radius:8px;padding:3px}
  .tf{
    font-family:"IBM Plex Mono",monospace;font-size:12px;font-weight:500;
    color:var(--muted);background:transparent;border:none;border-radius:5px;
    padding:5px 9px;cursor:pointer;transition:.12s;
  }
  .tf:hover{color:var(--txt)}
  .tf.active{background:var(--btc);color:#1a1205;font-weight:600}
  .tf:focus-visible{outline:2px solid var(--draw);outline-offset:1px}

  .ticker{display:flex;align-items:baseline;gap:12px;margin-left:2px}
  .ticker .sym{color:var(--muted);font-size:12px;font-weight:600;letter-spacing:.4px}
  .ticker .px{font-size:20px;font-weight:600}
  .ticker .chg{font-size:12.5px;font-weight:500;padding:2px 7px;border-radius:5px}
  .chg.up{color:var(--bull);background:rgba(38,166,154,.12)}
  .chg.down{color:var(--bear);background:rgba(239,83,80,.12)}
  @keyframes tick{0%{background:rgba(255,255,255,.08)}100%{background:transparent}}
  .flash{animation:tick .35s ease-out}

  .spacer{flex:1}
  .status{display:flex;align-items:center;gap:7px;color:var(--muted);font-size:11.5px;font-weight:500}
  .status .led{width:8px;height:8px;border-radius:50%;background:var(--muted-2);transition:.3s}
  .status .led.live{background:var(--bull);box-shadow:0 0 8px var(--bull)}
  .status .led.err{background:var(--bear);box-shadow:0 0 8px var(--bear)}

  .src-sel{
    background:var(--panel-2);color:var(--muted);border:1px solid var(--hair);
    border-radius:7px;font-family:"IBM Plex Mono",monospace;font-size:11.5px;
    padding:5px 8px;cursor:pointer;
  }

  /* ---------- BODY ROW ---------- */
  .row{flex:1;display:flex;min-height:0}

  /* ---------- LEFT TOOLBAR ---------- */
  .tools{
    width:54px;flex:0 0 54px;
    background:var(--panel-2);border-right:1px solid var(--hair);
    display:flex;flex-direction:column;align-items:center;gap:4px;
    padding:8px 0;
  }
  .tool{
    width:38px;height:38px;border-radius:9px;
    display:flex;align-items:center;justify-content:center;
    color:var(--muted);background:transparent;border:1px solid transparent;
    cursor:pointer;transition:.12s;
  }
  .tool:hover{color:var(--txt);background:var(--panel);border-color:var(--hair)}
  .tool.active{color:var(--btc);border-color:var(--hair-2);background:var(--panel)}
  .tool:focus-visible{outline:2px solid var(--draw);outline-offset:1px}
  .tool svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
  .tsep{width:26px;height:1px;background:var(--hair);margin:5px 0}

  /* ---------- CHART AREA ---------- */
  .stage{flex:1;position:relative;min-width:0;background:var(--ink)}
  #chart{position:absolute;inset:0}
  #overlay{position:absolute;inset:0;pointer-events:none}

  .hint{
    position:absolute;left:12px;bottom:12px;z-index:5;
    font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--muted-2);
    background:rgba(10,13,19,.72);border:1px solid var(--hair);
    border-radius:6px;padding:5px 9px;backdrop-filter:blur(3px);
    max-width:60%;line-height:1.5;
  }
  .hint b{color:var(--muted)}

  /* indicator chip panel, top-right of stage */
  .ind-panel{
    position:absolute;top:10px;left:10px;z-index:5;
    display:flex;flex-direction:column;gap:6px;align-items:flex-start;
  }
  .ind-chip{
    display:flex;align-items:center;gap:8px;
    background:rgba(13,18,27,.82);border:1px solid var(--hair);
    border-radius:7px;padding:5px 9px;backdrop-filter:blur(3px);
    font-family:"IBM Plex Mono",monospace;font-size:11.5px;color:var(--muted);
  }
  .ind-chip label{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none}
  .ind-chip input[type=checkbox]{accent-color:var(--btc);width:13px;height:13px;cursor:pointer}
  .ind-chip input[type=number]{
    width:42px;background:var(--panel-2);border:1px solid var(--hair);color:var(--txt);
    border-radius:4px;font-family:inherit;font-size:11px;padding:2px 4px;
  }
  .ind-chip .swatch{width:9px;height:9px;border-radius:2px}

  /* error banner */
  .banner{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:8;
    background:var(--panel);border:1px solid var(--bear);border-radius:12px;
    padding:20px 24px;max-width:380px;text-align:center;display:none;
  }
  .banner.show{display:block}
  .banner h3{margin:0 0 8px;font-size:15px;color:var(--bear)}
  .banner p{margin:0 0 14px;font-size:13px;color:var(--muted);line-height:1.55}
  .banner button{
    background:var(--btc);color:#1a1205;border:none;border-radius:7px;
    padding:8px 16px;font-family:inherit;font-weight:600;cursor:pointer;font-size:13px;
  }

  @media (prefers-reduced-motion: reduce){ .flash{animation:none} }
</style>
</head>
<body>

<header>
  <div class="brand"><span class="dot"></span>IB TERMINAL <small>· btc</small></div>

  <div class="tfs" id="tfs">
    <button class="tf" data-tf="1m">1m</button>
    <button class="tf" data-tf="5m">5m</button>
    <button class="tf" data-tf="15m">15m</button>
    <button class="tf active" data-tf="1h">1h</button>
    <button class="tf" data-tf="4h">4h</button>
    <button class="tf" data-tf="1d">1D</button>
  </div>

  <div class="ticker">
    <span class="sym">BTC/USDT</span>
    <span class="px mono" id="px">—</span>
    <span class="chg mono" id="chg">—</span>
  </div>

  <div class="spacer"></div>

  <select class="src-sel" id="src" title="Fonte de dados">
    <option value="binance">Binance</option>
    <option value="bybit">Bybit</option>
  </select>

  <div class="status"><span class="led" id="led"></span><span id="statusTxt">conectando…</span></div>
</header>

<div class="row">
  <!-- TOOLBAR -->
  <nav class="tools" id="tools">
    <button class="tool active" data-tool="cursor" title="Cursor / mover (V)">
      <svg viewBox="0 0 24 24"><path d="M5 3l5 16 2.5-6.5L19 10z"/></svg>
    </button>
    <button class="tool" data-tool="trend" title="Linha de tendência (T)">
      <svg viewBox="0 0 24 24"><path d="M4 20L20 4"/><circle cx="4" cy="20" r="1.4"/><circle cx="20" cy="4" r="1.4"/></svg>
    </button>
    <button class="tool" data-tool="hline" title="Linha horizontal (H)">
      <svg viewBox="0 0 24 24"><path d="M3 12h18"/><circle cx="12" cy="12" r="1.4"/></svg>
    </button>
    <button class="tool" data-tool="channel" title="Canal paralelo (C)">
      <svg viewBox="0 0 24 24"><path d="M4 18L18 4M7 21L21 7"/></svg>
    </button>
    <button class="tool" data-tool="fib" title="Fibonacci (F)">
      <svg viewBox="0 0 24 24"><path d="M3 5h18M3 10h18M3 14h18M3 19h18"/></svg>
    </button>
    <div class="tsep"></div>
    <button class="tool" data-act="undo" title="Desfazer último (Del)">
      <svg viewBox="0 0 24 24"><path d="M9 7L4 12l5 5"/><path d="M4 12h11a5 5 0 0 1 0 10h-1"/></svg>
    </button>
    <button class="tool" data-act="clear" title="Limpar tudo">
      <svg viewBox="0 0 24 24"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13"/></svg>
    </button>
  </nav>

  <!-- CHART -->
  <div class="stage">
    <div id="chart"></div>
    <canvas id="overlay"></canvas>

    <div class="ind-panel">
      <div class="ind-chip">
        <label><input type="checkbox" id="emaOn" checked><span class="swatch" style="background:var(--btc)"></span>EMA</label>
        <input type="number" id="emaLen" value="21" min="2" max="400" title="Período">
      </div>
    </div>

    <div class="banner" id="banner">
      <h3>Sem dados do mercado</h3>
      <p id="bannerMsg">Não consegui carregar os candles desta fonte. Pode ser bloqueio de região ou CORS. Tente outra fonte.</p>
      <button id="bannerBtn">Tentar Bybit</button>
    </div>

    <div class="hint" id="hint">
      Selecione uma ferramenta à esquerda e <b>clique no gráfico</b> para marcar os pontos. <b>Esc</b> cancela · <b>Del</b> desfaz.
    </div>
  </div>
</div>

<script>
/* =========================================================================
   IB · BTC TERMINAL — MVP
   Estrutura pensada para crescer: a fonte de dados e os indicadores são
   módulos isolados. Para adicionar um indicador novo, registre-o em
   INDICATORS (ver comentário mais abaixo).
   ========================================================================= */

const $ = s => document.querySelector(s);

/* ---------- estado global ---------- */
const S = {
  source: 'binance',
  tf: '1h',
  candles: [],          // {time, open, high, low, close, volume}
  drawings: [],         // desenhos do usuário (âncoras em time/price)
  tool: 'cursor',
  pending: [],          // pontos em construção
  hover: null,          // {time, price} do crosshair
  ws: null,
  emaPrev: null,        // EMA do último candle fechado (para update ao vivo)
};

/* ---------- persistência (localStorage com proteção) ---------- */
const store = {
  save(){ try{ localStorage.setItem('ib_term', JSON.stringify({tf:S.tf, source:S.source, drawings:S.drawings})); }catch(e){} },
  load(){ try{ return JSON.parse(localStorage.getItem('ib_term')||'{}'); }catch(e){ return {}; } }
};

/* =========================================================================
   FONTES DE DADOS
   Cada fonte expõe: rest(tf) -> Promise<candles[]>  e  ws(tf, onCandle) -> socket
   ========================================================================= */
const SOURCES = {
  binance:{
    tfMap:{'1m':'1m','5m':'5m','15m':'15m','1h':'1h','4h':'4h','1d':'1d'},
    async rest(tf){
      const url = `https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=${this.tfMap[tf]}&limit=1000`;
      const r = await fetch(url); if(!r.ok) throw new Error('http '+r.status);
      const d = await r.json();
      return d.map(k=>({time:k[0]/1000, open:+k[1], high:+k[2], low:+k[3], close:+k[4], volume:+k[5]}));
    },
    ws(tf, onCandle){
      const sock = new WebSocket(`wss://stream.binance.com:9443/ws/btcusdt@kline_${this.tfMap[tf]}`);
      sock.onmessage = e=>{
        const k = JSON.parse(e.data).k;
        onCandle({time:k.t/1000, open:+k.o, high:+k.h, low:+k.l, close:+k.c, volume:+k.v}, k.x);
      };
      return sock;
    }
  },
  bybit:{
    tfMap:{'1m':'1','5m':'5','15m':'15','1h':'60','4h':'240','1d':'D'},
    async rest(tf){
      const url = `https://api.bybit.com/v5/market/kline?category=spot&symbol=BTCUSDT&interval=${this.tfMap[tf]}&limit=1000`;
      const r = await fetch(url); if(!r.ok) throw new Error('http '+r.status);
      const j = await r.json();
      const list = (j.result&&j.result.list)||[];
      return list.map(k=>({time:+k[0]/1000, open:+k[1], high:+k[2], low:+k[3], close:+k[4], volume:+k[5]})).reverse();
    },
    ws(tf, onCandle){
      const sock = new WebSocket('wss://stream.bybit.com/v5/public/spot');
      sock.onopen = ()=> sock.send(JSON.stringify({op:'subscribe', args:[`kline.${this.tfMap[tf]}.BTCUSDT`]}));
      sock.onmessage = e=>{
        const m = JSON.parse(e.data);
        if(m.topic && m.data && m.data[0]){
          const k = m.data[0];
          onCandle({time:+k.start/1000, open:+k.open, high:+k.high, low:+k.low, close:+k.close, volume:+k.volume}, k.confirm);
        }
      };
      return sock;
    }
  }
};

/* =========================================================================
   GRÁFICO (Lightweight Charts)
   ========================================================================= */
const stage = $('#chart');
const chart = LightweightCharts.createChart(stage,{
  layout:{ background:{color:'transparent'}, textColor:'#7f8a9e', fontFamily:"'IBM Plex Mono', monospace", fontSize:11 },
  grid:{ vertLines:{color:'rgba(29,37,52,.55)'}, horzLines:{color:'rgba(29,37,52,.55)'} },
  crosshair:{ mode:LightweightCharts.CrosshairMode.Normal,
    vertLine:{color:'#41b3ff66', width:1, style:2, labelBackgroundColor:'#1d2534'},
    horzLine:{color:'#41b3ff66', width:1, style:2, labelBackgroundColor:'#1d2534'} },
  rightPriceScale:{ borderColor:'#1d2534', scaleMargins:{top:.08, bottom:.22} },
  timeScale:{ borderColor:'#1d2534', timeVisible:true, secondsVisible:false },
  handleScale:true, handleScroll:true,
});

const candleSeries = chart.addCandlestickSeries({
  upColor:'#26a69a', downColor:'#ef5350', borderVisible:false,
  wickUpColor:'#26a69a', wickDownColor:'#ef5350',
});
const volSeries = chart.addHistogramSeries({
  priceScaleId:'vol', priceFormat:{type:'volume'}, color:'#26a69a55',
});
chart.priceScale('vol').applyOptions({ scaleMargins:{top:.85, bottom:0} });

/* série de linha reutilizável para indicadores de sobreposição (overlay) */
const emaSeries = chart.addLineSeries({ color:'#f7931a', lineWidth:2, priceLineVisible:false, lastValueVisible:false });

/* =========================================================================
   INDICADORES  — registry extensível
   Para adicionar um indicador NOVO no futuro:
   1) escreva uma função que recebe os candles e devolve um array {time,value}
   2) crie a série no chart (addLineSeries / etc.) e plugue aqui
   O Order Block que fizemos, por exemplo, entraria como um módulo próprio
   que desenha boxes — o padrão é o mesmo: calcular sobre S.candles e desenhar.
   ========================================================================= */
const INDICATORS = {
  ema(candles, len){
    const k = 2/(len+1); const out=[]; let prev=null;
    for(const c of candles){
      prev = prev===null ? c.close : c.close*k + prev*(1-k);
      out.push({time:c.time, value:prev});
    }
    return out;
  }
};

function renderEMA(){
  const on = $('#emaOn').checked;
  const len = Math.max(2, +$('#emaLen').value||21);
  if(!on || S.candles.length<len){ emaSeries.setData([]); S.emaPrev=null; return; }
  const data = INDICATORS.ema(S.candles, len);
  emaSeries.setData(data);
  S.emaPrev = data.length>1 ? data[data.length-2].value : null; // penúltimo (último fechado)
}

/* =========================================================================
   CARREGAMENTO + TEMPO REAL
   ========================================================================= */
function setStatus(state, txt){
  const led=$('#led'); led.className='led'+(state==='live'?' live':state==='err'?' err':'');
  $('#statusTxt').textContent = txt;
}

async function loadData(){
  setStatus('', 'carregando…'); $('#banner').classList.remove('show');
  const src = SOURCES[S.source];
  try{
    const candles = await src.rest(S.tf);
    if(!candles.length) throw new Error('vazio');
    S.candles = candles;
    candleSeries.setData(candles);
    volSeries.setData(candles.map(c=>({time:c.time, value:c.volume, color:c.close>=c.open?'#26a69a55':'#ef535055'})));
    renderEMA();
    chart.timeScale().fitContent();
    updateTicker(candles[candles.length-1], candles[candles.length-2]);
    openSocket();
    setStatus('live','ao vivo');
  }catch(err){
    console.error(err);
    setStatus('err','falha na fonte');
    $('#bannerMsg').textContent = `Não consegui carregar de "${S.source}" (${err.message}). Pode ser bloqueio de região/CORS aí do Japão. Troque a fonte e tente de novo.`;
    const other = S.source==='binance'?'bybit':'binance';
    $('#bannerBtn').textContent = 'Tentar '+other[0].toUpperCase()+other.slice(1);
    $('#banner').classList.add('show');
  }
}

function openSocket(){
  if(S.ws){ try{S.ws.close();}catch(e){} S.ws=null; }
  const sock = SOURCES[S.source].ws(S.tf, onLiveCandle);
  sock.onclose = ()=>{ if(S.ws===sock){ setStatus('', 'reconectando…'); setTimeout(()=>{ if(S.ws===sock) openSocket(); }, 2000); } };
  sock.onerror = ()=>{ try{sock.close();}catch(e){} };
  S.ws = sock;
}

let lastPx=null;
function onLiveCandle(c, closed){
  const arr=S.candles, last=arr[arr.length-1];
  if(last && c.time===last.time){ arr[arr.length-1]=c; }
  else if(!last || c.time>last.time){ arr.push(c); }
  else { return; }

  candleSeries.update(c);
  volSeries.update({time:c.time, value:c.volume, color:c.close>=c.open?'#26a69a55':'#ef535055'});

  // EMA ao vivo (incremental sobre o último fechado)
  if($('#emaOn').checked && S.emaPrev!==null){
    const len=Math.max(2,+$('#emaLen').value||21), k=2/(len+1);
    emaSeries.update({time:c.time, value:c.close*k + S.emaPrev*(1-k)});
    if(closed) S.emaPrev = c.close*k + S.emaPrev*(1-k);
  } else if(closed){ renderEMA(); }

  updateTicker(c, arr[arr.length-2]);
  setStatus('live','ao vivo');
}

function updateTicker(cur, prev){
  if(!cur) return;
  const px=$('#px'); px.textContent = cur.close.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  px.classList.remove('flash'); void px.offsetWidth; px.classList.add('flash');
  if(prev){
    const d = cur.close-prev.close, pct = d/prev.close*100;
    const chg=$('#chg'); chg.className='chg mono '+(d>=0?'up':'down');
    chg.textContent = (d>=0?'+':'')+pct.toFixed(2)+'%';
  }
}

/* =========================================================================
   FERRAMENTAS DE DESENHO  (canvas sobreposto sincronizado)
   ========================================================================= */
const cv = $('#overlay'), ctx = cv.getContext('2d');
function resizeOverlay(){
  const r = stage.getBoundingClientRect(), dpr=window.devicePixelRatio||1;
  cv.width=r.width*dpr; cv.height=r.height*dpr; cv.style.width=r.width+'px'; cv.style.height=r.height+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize', resizeOverlay);

const xOf = t => chart.timeScale().timeToCoordinate(t);
const yOf = p => candleSeries.priceToCoordinate(p);
const FIB = [0,0.236,0.382,0.5,0.618,0.786,1];

function line(x1,y1,x2,y2,color,dash){
  ctx.save(); ctx.strokeStyle=color; ctx.lineWidth=1.4; ctx.setLineDash(dash||[]);
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); ctx.restore();
}
function dot(x,y){ ctx.save(); ctx.fillStyle=S.tool==='cursor'?'#41b3ff':'#f7931a'; ctx.beginPath(); ctx.arc(x,y,3,0,7); ctx.fill(); ctx.restore(); }
function tag(x,y,txt,color){
  ctx.save(); ctx.font="10px 'IBM Plex Mono', monospace"; ctx.fillStyle=color; ctx.textBaseline='middle';
  ctx.fillText(txt, x+4, y); ctx.restore();
}

function drawTrend(d, preview){
  const x1=xOf(d.points[0].time), y1=yOf(d.points[0].price);
  const x2=xOf(d.points[1].time), y2=yOf(d.points[1].price);
  if(x1==null||x2==null||y1==null||y2==null) return;
  // estende para a direita
  const w=cv.clientWidth; let ex=x2, ey=y2;
  if(x2!==x1){ const m=(y2-y1)/(x2-x1); ex=w; ey=y1+m*(w-x1); }
  line(x1,y1,ex,ey, preview?'#41b3ff88':'#41b3ff');
  if(!preview){ dot(x1,y1); dot(x2,y2); }
}
function drawHLine(d){
  const y=yOf(d.price); if(y==null) return;
  line(0,y,cv.clientWidth,y,'#41b3ffcc',[6,4]);
  tag(cv.clientWidth-88,y-8, d.price.toLocaleString('en-US',{maximumFractionDigits:2}), '#41b3ff');
}
function drawFib(d, preview){
  const p1=d.points[0], p2=d.points[1];
  const x1=xOf(p1.time), x2=xOf(p2.time); if(x1==null||x2==null) return;
  const left=Math.min(x1,x2), right=cv.clientWidth;
  for(const lv of FIB){
    const price = p1.price + (p2.price-p1.price)*lv;
    const y=yOf(price); if(y==null) continue;
    const col = lv===0||lv===1 ? '#41b3ff' : lv===0.618 ? '#f7931a' : '#41b3ff88';
    line(left,y,right,y,col,[3,3]);
    tag(left, y-7, lv.toFixed(3)+'  '+price.toLocaleString('en-US',{maximumFractionDigits:2}), col);
  }
  if(!preview){ const y1=yOf(p1.price),y2=yOf(p2.price); if(y1!=null)dot(x1,y1); if(y2!=null)dot(x2,y2); }
}
function drawChannel(d, preview){
  const [p1,p2,p3]=d.points;
  const x1=xOf(p1.time),y1=yOf(p1.price),x2=xOf(p2.time),y2=yOf(p2.price);
  if(x1==null||x2==null||y1==null||y2==null) return;
  const w=cv.clientWidth; let ex=w,ey=y2;
  if(x2!==x1){ const m=(y2-y1)/(x2-x1); ey=y1+m*(w-x1); }
  // deslocamento em pixels (escala de preço linear)
  let dy=0;
  if(p3){ const base=yOf(p1.price), off=yOf(p1.price+(p3.price - (p1.price+((p2.price-p1.price)/(p2.time-p1.time))*(p3.time-p1.time)))); if(base!=null&&off!=null) dy=off-base; }
  // faixa preenchida
  if(dy!==0){
    ctx.save(); ctx.fillStyle='rgba(65,179,255,.08)';
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(w,ey); ctx.lineTo(w,ey+dy); ctx.lineTo(x1,y1+dy); ctx.closePath(); ctx.fill(); ctx.restore();
  }
  line(x1,y1,w,ey, preview?'#41b3ff88':'#41b3ff');
  if(dy!==0) line(x1,y1+dy,w,ey+dy, preview?'#41b3ff66':'#41b3ffaa');
  if(!preview){ dot(x1,y1); dot(x2,y2); if(p3){const y3=yOf(p3.price); if(y3!=null)dot(xOf(p3.time),y3);} }
}

function redraw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  for(const d of S.drawings){
    if(d.type==='trend') drawTrend(d);
    else if(d.type==='hline') drawHLine(d);
    else if(d.type==='fib') drawFib(d);
    else if(d.type==='channel') drawChannel(d);
  }
  // pré-visualização enquanto coloca pontos
  if(S.pending.length && S.hover){
    const pts=[...S.pending, S.hover];
    if(S.tool==='trend' && pts.length>=2) drawTrend({points:[pts[0],pts[1]]}, true);
    if(S.tool==='fib'   && pts.length>=2) drawFib({points:[pts[0],pts[1]]}, true);
    if(S.tool==='channel'){
      if(pts.length===2) drawTrend({points:[pts[0],pts[1]]}, true);
      else if(pts.length>=3) drawChannel({points:[pts[0],pts[1],pts[2]]}, true);
    }
    for(const p of S.pending){ const x=xOf(p.time),y=yOf(p.price); if(x!=null&&y!=null) dot(x,y); }
  }
  requestAnimationFrame(redraw);
}
requestAnimationFrame(redraw);

/* captura de cliques e crosshair */
chart.subscribeCrosshairMove(param=>{
  if(!param.point) { S.hover=null; return; }
  const price = candleSeries.coordinateToPrice(param.point.y);
  const time = param.time ?? chart.timeScale().coordinateToTime(param.point.x);
  if(price!=null && time!=null) S.hover={time, price};
});

chart.subscribeClick(param=>{
  if(S.tool==='cursor' || !param.point) return;
  const price = candleSeries.coordinateToPrice(param.point.y);
  const time = param.time ?? chart.timeScale().coordinateToTime(param.point.x);
  if(price==null || time==null) return;
  const pt={time, price};

  if(S.tool==='hline'){ S.drawings.push({type:'hline', price}); finishDraw(); return; }

  S.pending.push(pt);
  const need = S.tool==='channel' ? 3 : 2;
  if(S.pending.length>=need){
    S.drawings.push({type:S.tool, points:S.pending.slice()});
    finishDraw();
  }
});

function finishDraw(){ S.pending=[]; setTool('cursor'); store.save(); }

/* =========================================================================
   UI / EVENTOS
   ========================================================================= */
function setTool(t){
  S.tool=t; S.pending=[];
  document.querySelectorAll('.tool[data-tool]').forEach(b=>b.classList.toggle('active', b.dataset.tool===t));
  chart.applyOptions({ handleScroll:t==='cursor', handleScale:t==='cursor' });
  cv.style.pointerEvents='none'; // cliques passam pro chart; captura é via subscribeClick
}

$('#tools').addEventListener('click', e=>{
  const b=e.target.closest('button'); if(!b) return;
  if(b.dataset.tool) setTool(b.dataset.tool);
  if(b.dataset.act==='undo'){ S.drawings.pop(); store.save(); }
  if(b.dataset.act==='clear'){ S.drawings=[]; S.pending=[]; store.save(); }
});

$('#tfs').addEventListener('click', e=>{
  const b=e.target.closest('.tf'); if(!b) return;
  document.querySelectorAll('.tf').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); S.tf=b.dataset.tf; store.save(); loadData();
});

$('#src').addEventListener('change', e=>{ S.source=e.target.value; store.save(); loadData(); });
$('#emaOn').addEventListener('change', renderEMA);
$('#emaLen').addEventListener('change', renderEMA);
$('#bannerBtn').addEventListener('click', ()=>{
  S.source = S.source==='binance'?'bybit':'binance';
  $('#src').value=S.source; store.save(); loadData();
});

document.addEventListener('keydown', e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT') return;
  const map={v:'cursor',t:'trend',h:'hline',c:'channel',f:'fib'};
  if(map[e.key.toLowerCase()]) setTool(map[e.key.toLowerCase()]);
  if(e.key==='Escape'){ S.pending=[]; setTool('cursor'); }
  if(e.key==='Delete'||e.key==='Backspace'){ S.drawings.pop(); store.save(); }
});

/* redimensiona overlay quando o chart muda de tamanho */
new ResizeObserver(resizeOverlay).observe(stage);

/* =========================================================================
   BOOT
   ========================================================================= */
(function init(){
  const saved=store.load();
  if(saved.tf){ S.tf=saved.tf; document.querySelectorAll('.tf').forEach(x=>x.classList.toggle('active',x.dataset.tf===S.tf)); }
  if(saved.source){ S.source=saved.source; $('#src').value=S.source; }
  if(Array.isArray(saved.drawings)) S.drawings=saved.drawings;
  resizeOverlay();
  loadData();
})();
</script>
