<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>IB · BTC Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
  :root{
    --ink:#0a0d13;          /* fundo mais profundo */
    --panel:#111621;        /* barras e painéis */
    --panel-2:#0d121b;
    --hair:#1d2534;         /* hairlines / bordas */
    --hair-2:#283245;
    --txt:#e7ebf2;
    --muted:#7f8a9e;
    --muted-2:#586074;
    --bull:#26a69a;
    --bear:#ef5350;
    --btc:#f7931a;          /* laranja Bitcoin — cor-assinatura */
    --draw:#41b3ff;         /* cor dos desenhos do usuário */
    --draw-fill:rgba(65,179,255,.10);
  }
  *{box-sizing:border-box}
  /* trava o zoom/scroll da PÁGINA: o zoom fica só no gráfico (Lightweight Charts) */
  html,body{height:100%;margin:0;overscroll-behavior:none;touch-action:manipulation}
  body{
    background:var(--ink);
    color:var(--txt);
    font-family:"Space Grotesk",system-ui,sans-serif;
    display:flex;flex-direction:column;
    overflow:hidden;
    position:fixed;inset:0;width:100%;   /* impede o "rubber-band" e o zoom da tela inteira no iOS */
    -webkit-font-smoothing:antialiased;
  }
  /* o gráfico gerencia seus próprios gestos (pan/pinch); a página não */
  .stage,#chart,#overlay{touch-action:none}
  .mono{font-family:"IBM Plex Mono",ui-monospace,monospace}

  /* ---------- TOP BAR ---------- */
  header{
    height:52px;flex:0 0 52px;
    display:flex;align-items:center;gap:18px;
    padding:0 14px;
    background:linear-gradient(180deg,var(--panel),var(--panel-2));
    border-bottom:1px solid var(--hair);
    z-index:10;
  }
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;letter-spacing:.5px;font-size:14px}
  .brand .dot{width:9px;height:9px;border-radius:2px;background:var(--btc);box-shadow:0 0 10px var(--btc)}
  .brand small{color:var(--muted);font-weight:500;letter-spacing:.3px}

  .tfs{display:flex;gap:2px;background:var(--panel-2);border:1px solid var(--hair);border-radius:8px;padding:3px}
  .tf{
    font-family:"IBM Plex Mono",monospace;font-size:12px;font-weight:500;
    color:var(--muted);background:transparent;border:none;border-radius:5px;
    padding:5px 9px;cursor:pointer;transition:.12s;
  }
  .tf:hover{color:var(--txt)}
  .tf.active{background:var(--btc);color:#1a1205;font-weight:600}
  .tf:focus-visible{outline:2px solid var(--draw);outline-offset:1px}

  .ticker{display:flex;align-items:baseline;gap:12px;margin-left:2px}
  .ticker .sym{color:var(--muted);font-size:12px;font-weight:600;letter-spacing:.4px}
  .ticker .px{font-size:20px;font-weight:600}
  .ticker .chg{font-size:12.5px;font-weight:500;padding:2px 7px;border-radius:5px}
  .chg.up{color:var(--bull);background:rgba(38,166,154,.12)}
  .chg.down{color:var(--bear);background:rgba(239,83,80,.12)}
  @keyframes tick{0%{background:rgba(255,255,255,.08)}100%{background:transparent}}
  .flash{animation:tick .35s ease-out}

  .spacer{flex:1}
  .status{display:flex;align-items:center;gap:7px;color:var(--muted);font-size:11.5px;font-weight:500}
  .status .led{width:8px;height:8px;border-radius:50%;background:var(--muted-2);transition:.3s}
  .status .led.live{background:var(--bull);box-shadow:0 0 8px var(--bull)}
  .status .led.err{background:var(--bear);box-shadow:0 0 8px var(--bear)}

  .src-sel{
    background:var(--panel-2);color:var(--muted);border:1px solid var(--hair);
    border-radius:7px;font-family:"IBM Plex Mono",monospace;font-size:11.5px;
    padding:5px 8px;cursor:pointer;
  }

  /* ---------- BODY ROW ---------- */
  .row{flex:1;display:flex;min-height:0}

  /* ---------- MENU DE INDICADORES (header, estilo TradingView) ---------- */
  .ind-menu-wrap{position:relative}
  .ind-btn{
    display:flex;align-items:center;gap:6px;
    background:var(--panel-2);color:var(--txt);border:1px solid var(--hair);
    border-radius:8px;font-family:"Space Grotesk",sans-serif;font-size:12.5px;font-weight:500;
    padding:6px 11px;cursor:pointer;transition:.12s;
  }
  .ind-btn:hover{border-color:var(--hair-2);color:#fff}
  .ind-btn.active{border-color:var(--btc);color:var(--btc)}
  .ind-btn svg{stroke:currentColor}
  .ind-menu{
    position:absolute;top:calc(100% + 8px);left:0;z-index:20;min-width:300px;
    background:var(--panel);border:1px solid var(--hair-2);border-radius:11px;
    box-shadow:0 12px 34px rgba(0,0,0,.55);padding:7px;
  }
  .ind-menu[hidden]{display:none}
  .ind-menu-title{
    font-family:"IBM Plex Mono",monospace;font-size:10.5px;letter-spacing:.6px;
    text-transform:uppercase;color:var(--muted-2);padding:4px 8px 8px;
  }
  .ind-row{
    display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:8px;
    transition:.12s;
  }
  .ind-row:hover{background:var(--panel-2)}
  .ind-row + .ind-row{border-top:1px solid var(--hair)}
  .ind-name{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:500;flex:1;min-width:96px}
  .ind-name .dotc{width:9px;height:9px;border-radius:2px;flex:0 0 auto}
  .ind-params{
    display:flex;align-items:center;gap:5px;flex-wrap:wrap;justify-content:flex-end;
    font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--muted);
  }
  .ind-params input[type=number]{
    width:44px;background:var(--panel-2);border:1px solid var(--hair);color:var(--txt);
    border-radius:5px;font-family:inherit;font-size:11px;padding:3px 5px;
  }
  .ind-params select{
    background:var(--panel-2);border:1px solid var(--hair);color:var(--txt);
    border-radius:5px;font-family:inherit;font-size:11px;padding:3px 4px;cursor:pointer;
  }
  /* toggle switch */
  .sw{position:relative;display:inline-block;width:34px;height:19px;flex:0 0 auto}
  .sw input{opacity:0;width:0;height:0;position:absolute}
  .sw span{position:absolute;inset:0;background:var(--hair-2);border-radius:10px;cursor:pointer;transition:.15s}
  .sw span::before{content:"";position:absolute;width:15px;height:15px;left:2px;top:2px;background:#e7ebf2;border-radius:50%;transition:.15s}
  .sw input:checked + span{background:var(--btc)}
  .sw input:checked + span::before{transform:translateX(15px);background:#1a1205}
  .sw input:focus-visible + span{outline:2px solid var(--draw);outline-offset:1px}

  /* ---------- CHART AREA ---------- */
  .stage{flex:1;position:relative;min-width:0;background:var(--ink)}
  #chart{position:absolute;inset:0}
  /* overlay ACIMA das canvas internas do gráfico (que usam z-index 1 e 2),
     senão os toques/cliques de desenho não chegam nele */
  #overlay{position:absolute;inset:0;pointer-events:none;z-index:4}

  /* error banner */
  .banner{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:8;
    background:var(--panel);border:1px solid var(--bear);border-radius:12px;
    padding:20px 24px;max-width:380px;text-align:center;display:none;
  }
  .banner.show{display:block}
  .banner h3{margin:0 0 8px;font-size:15px;color:var(--bear)}
  .banner p{margin:0 0 14px;font-size:13px;color:var(--muted);line-height:1.55}
  .banner button{
    background:var(--btc);color:#1a1205;border:none;border-radius:7px;
    padding:8px 16px;font-family:inherit;font-weight:600;cursor:pointer;font-size:13px;
  }

  @media (prefers-reduced-motion: reduce){ .flash{animation:none} }

  /* ---------- RESPONSIVO (tablet / celular) ---------- */
  @media (max-width:820px){
    header{height:auto;flex:0 0 auto;flex-wrap:wrap;gap:10px;padding:8px 10px}
    .brand{font-size:12.5px}
    .ticker .px{font-size:17px}
    .status span:last-child{display:none}      /* mantém só o LED no aperto */
    .ind-panel{transform:scale(.92);transform-origin:top left}
  }
  @media (max-width:560px){
    header{gap:8px}
    .brand small{display:none}
    .tf{padding:5px 7px}
    .ticker{margin-left:0}
    .ind-btn{padding:6px 9px;font-size:12px}
    .ind-menu{min-width:min(300px,92vw);left:auto;right:0}
  }
</style>
</head>
<body>

<header>
  <div class="brand"><span class="dot"></span>IB TERMINAL <small>· btc</small></div>

  <div class="tfs" id="tfs">
    <button class="tf" data-tf="1m">1m</button>
    <button class="tf" data-tf="5m">5m</button>
    <button class="tf" data-tf="15m">15m</button>
    <button class="tf active" data-tf="1h">1h</button>
    <button class="tf" data-tf="4h">4h</button>
    <button class="tf" data-tf="1d">1D</button>
  </div>

  <div class="ticker">
    <span class="sym">BTC/USDT</span>
    <span class="px mono" id="px">—</span>
    <span class="chg mono" id="chg">—</span>
  </div>

  <div class="ind-menu-wrap">
    <button class="ind-btn" id="indBtn" title="Indicadores">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 17c3 0 3-10 6-10s3 10 6 10 3-6 6-6"/></svg>
      Indicadores
    </button>
    <div class="ind-menu" id="indMenu" hidden>
      <div class="ind-menu-title">Indicadores</div>

      <div class="ind-row">
        <label class="sw"><input type="checkbox" id="emaOn" checked><span></span></label>
        <span class="ind-name"><span class="dotc" style="background:var(--btc)"></span>EMA</span>
        <span class="ind-params">período <input type="number" id="emaLen" value="21" min="2" max="400"></span>
      </div>

      <div class="ind-row">
        <label class="sw"><input type="checkbox" id="obOn"><span></span></label>
        <span class="ind-name"><span class="dotc" style="background:linear-gradient(90deg,var(--bull),var(--bear))"></span>Order Blocks</span>
        <span class="ind-params">
          len <input type="number" id="obLen" value="5" min="1" max="20" title="Comprimento do pivô">
          qtd <input type="number" id="obCount" value="5" min="1" max="20" title="Quantos OB por lado">
          <select id="obMiti" title="Mitigação">
            <option value="Close">Close</option>
            <option value="Wick">Wick</option>
            <option value="Avg">Avg</option>
          </select>
        </span>
      </div>
    </div>
  </div>

  <div class="spacer"></div>

  <select class="src-sel" id="src" title="Fonte de dados">
    <option value="binance">Binance</option>
    <option value="bybit">Bybit</option>
  </select>

  <div class="status"><span class="led" id="led"></span><span id="statusTxt">conectando…</span></div>
</header>

<div class="row">
  <!-- CHART (barra de desenho removida a pedido — motor de desenho continua no código, dormente) -->
  <div class="stage">
    <div id="chart"></div>
    <canvas id="overlay"></canvas>

    <div class="banner" id="banner">
      <h3>Sem dados do mercado</h3>
      <p id="bannerMsg">Não consegui carregar os candles desta fonte. Pode ser bloqueio de região ou CORS. Tente outra fonte.</p>
      <button id="bannerBtn">Tentar Bybit</button>
    </div>

  </div>
</div>

<script>
/* =========================================================================
   IB · BTC TERMINAL — MVP
   Estrutura pensada para crescer: a fonte de dados e os indicadores são
   módulos isolados. Para adicionar um indicador novo, registre-o em
   INDICATORS (ver comentário mais abaixo).
   ========================================================================= */

const $ = s => document.querySelector(s);

/* ---------- estado global ---------- */
const S = {
  source: 'binance',
  tf: '1h',
  candles: [],          // {time, open, high, low, close, volume}
  drawings: [],         // desenhos do usuário (âncoras em time/price)
  tool: 'cursor',
  pending: [],          // pontos em construção
  hover: null,          // {time, price} do crosshair
  ws: null,
  emaPrev: null,        // EMA do último candle fechado (para update ao vivo)
};

/* ---------- persistência (localStorage com proteção) ---------- */
const store = {
  save(){ try{ localStorage.setItem('ib_term', JSON.stringify({tf:S.tf, source:S.source, drawings:S.drawings, ob:(typeof OB!=='undefined'?OB.cfg:undefined)})); }catch(e){} },
  load(){ try{ return JSON.parse(localStorage.getItem('ib_term')||'{}'); }catch(e){ return {}; } }
};

/* =========================================================================
   FONTES DE DADOS
   Cada fonte expõe: rest(tf) -> Promise<candles[]>  e  ws(tf, onCandle) -> socket
   ========================================================================= */
const SOURCES = {
  binance:{
    tfMap:{'1m':'1m','5m':'5m','15m':'15m','1h':'1h','4h':'4h','1d':'1d'},
    async rest(tf){
      const url = `https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=${this.tfMap[tf]}&limit=1000`;
      const r = await fetch(url); if(!r.ok) throw new Error('http '+r.status);
      const d = await r.json();
      return d.map(k=>({time:k[0]/1000, open:+k[1], high:+k[2], low:+k[3], close:+k[4], volume:+k[5]}));
    },
    ws(tf, onCandle){
      const sock = new WebSocket(`wss://stream.binance.com:9443/ws/btcusdt@kline_${this.tfMap[tf]}`);
      sock.onmessage = e=>{
        const k = JSON.parse(e.data).k;
        onCandle({time:k.t/1000, open:+k.o, high:+k.h, low:+k.l, close:+k.c, volume:+k.v}, k.x);
      };
      return sock;
    }
  },
  bybit:{
    tfMap:{'1m':'1','5m':'5','15m':'15','1h':'60','4h':'240','1d':'D'},
    async rest(tf){
      const url = `https://api.bybit.com/v5/market/kline?category=spot&symbol=BTCUSDT&interval=${this.tfMap[tf]}&limit=1000`;
      const r = await fetch(url); if(!r.ok) throw new Error('http '+r.status);
      const j = await r.json();
      const list = (j.result&&j.result.list)||[];
      return list.map(k=>({time:+k[0]/1000, open:+k[1], high:+k[2], low:+k[3], close:+k[4], volume:+k[5]})).reverse();
    },
    ws(tf, onCandle){
      const sock = new WebSocket('wss://stream.bybit.com/v5/public/spot');
      sock.onopen = ()=> sock.send(JSON.stringify({op:'subscribe', args:[`kline.${this.tfMap[tf]}.BTCUSDT`]}));
      sock.onmessage = e=>{
        const m = JSON.parse(e.data);
        if(m.topic && m.data && m.data[0]){
          const k = m.data[0];
          onCandle({time:+k.start/1000, open:+k.open, high:+k.high, low:+k.low, close:+k.close, volume:+k.volume}, k.confirm);
        }
      };
      return sock;
    }
  }
};

/* =========================================================================
   GRÁFICO (Lightweight Charts)
   ========================================================================= */
const stage = $('#chart');
const chart = LightweightCharts.createChart(stage,{
  layout:{ background:{color:'transparent'}, textColor:'#7f8a9e', fontFamily:"'IBM Plex Mono', monospace", fontSize:11 },
  grid:{ vertLines:{color:'rgba(29,37,52,.55)'}, horzLines:{color:'rgba(29,37,52,.55)'} },
  crosshair:{ mode:LightweightCharts.CrosshairMode.Normal,
    vertLine:{color:'#41b3ff66', width:1, style:2, labelBackgroundColor:'#1d2534'},
    horzLine:{color:'#41b3ff66', width:1, style:2, labelBackgroundColor:'#1d2534'} },
  rightPriceScale:{ borderColor:'#1d2534', scaleMargins:{top:.08, bottom:.22} },
  timeScale:{ borderColor:'#1d2534', timeVisible:true, secondsVisible:false },
  handleScale:true, handleScroll:true,
  autoSize:true,   /* o gráfico se ajusta sozinho ao container em qualquer tela */
});

const candleSeries = chart.addCandlestickSeries({
  upColor:'#26a69a', downColor:'#ef5350', borderVisible:false,
  wickUpColor:'#26a69a', wickDownColor:'#ef5350',
});
const volSeries = chart.addHistogramSeries({
  priceScaleId:'vol', priceFormat:{type:'volume'}, color:'#26a69a55',
});
chart.priceScale('vol').applyOptions({ scaleMargins:{top:.85, bottom:0} });

/* série de linha reutilizável para indicadores de sobreposição (overlay) */
const emaSeries = chart.addLineSeries({ color:'#f7931a', lineWidth:2, priceLineVisible:false, lastValueVisible:false });

/* =========================================================================
   INDICADORES  — registry extensível
   Para adicionar um indicador NOVO no futuro:
   1) escreva uma função que recebe os candles e devolve um array {time,value}
   2) crie a série no chart (addLineSeries / etc.) e plugue aqui
   O Order Block que fizemos, por exemplo, entraria como um módulo próprio
   que desenha boxes — o padrão é o mesmo: calcular sobre S.candles e desenhar.
   ========================================================================= */
const INDICATORS = {
  ema(candles, len){
    const k = 2/(len+1); const out=[]; let prev=null;
    for(const c of candles){
      prev = prev===null ? c.close : c.close*k + prev*(1-k);
      out.push({time:c.time, value:prev});
    }
    return out;
  }
};

function renderEMA(){
  const on = $('#emaOn').checked;
  const len = Math.max(2, +$('#emaLen').value||21);
  if(!on || S.candles.length<len){ emaSeries.setData([]); S.emaPrev=null; return; }
  const data = INDICATORS.ema(S.candles, len);
  emaSeries.setData(data);
  S.emaPrev = data.length>1 ? data[data.length-2].value : null; // penúltimo (último fechado)
}

/* =========================================================================
   CARREGAMENTO + TEMPO REAL
   ========================================================================= */
function setStatus(state, txt){
  const led=$('#led'); led.className='led'+(state==='live'?' live':state==='err'?' err':'');
  $('#statusTxt').textContent = txt;
}

async function loadData(){
  setStatus('', 'carregando…'); $('#banner').classList.remove('show');
  const src = SOURCES[S.source];
  try{
    const candles = await src.rest(S.tf);
    if(!candles.length) throw new Error('vazio');
    S.candles = candles;
    candleSeries.setData(candles);
    volSeries.setData(candles.map(c=>({time:c.time, value:c.volume, color:c.close>=c.open?'#26a69a55':'#ef535055'})));
    renderEMA();
    OB.compute();
    chart.timeScale().fitContent();
    updateTicker(candles[candles.length-1], candles[candles.length-2]);
    openSocket();
    setStatus('live','ao vivo');
  }catch(err){
    console.error(err);
    setStatus('err','falha na fonte');
    $('#bannerMsg').textContent = `Não consegui carregar de "${S.source}" (${err.message}). Pode ser bloqueio de região/CORS aí do Japão. Troque a fonte e tente de novo.`;
    const other = S.source==='binance'?'bybit':'binance';
    $('#bannerBtn').textContent = 'Tentar '+other[0].toUpperCase()+other.slice(1);
    $('#banner').classList.add('show');
  }
}

function openSocket(){
  if(S.ws){ try{S.ws.close();}catch(e){} S.ws=null; }
  const sock = SOURCES[S.source].ws(S.tf, onLiveCandle);
  sock.onclose = ()=>{ if(S.ws===sock){ setStatus('', 'reconectando…'); setTimeout(()=>{ if(S.ws===sock) openSocket(); }, 2000); } };
  sock.onerror = ()=>{ try{sock.close();}catch(e){} };
  S.ws = sock;
}

let lastPx=null;
function onLiveCandle(c, closed){
  const arr=S.candles, last=arr[arr.length-1];
  if(last && c.time===last.time){ arr[arr.length-1]=c; }
  else if(!last || c.time>last.time){ arr.push(c); }
  else { return; }

  candleSeries.update(c);
  volSeries.update({time:c.time, value:c.volume, color:c.close>=c.open?'#26a69a55':'#ef535055'});

  // EMA ao vivo (incremental sobre o último fechado)
  if($('#emaOn').checked && S.emaPrev!==null){
    const len=Math.max(2,+$('#emaLen').value||21), k=2/(len+1);
    emaSeries.update({time:c.time, value:c.close*k + S.emaPrev*(1-k)});
    if(closed) S.emaPrev = c.close*k + S.emaPrev*(1-k);
  } else if(closed){ renderEMA(); }

  // Order Blocks só recalculam quando o candle fecha (mitigação = barra confirmada)
  if(closed) OB.compute();

  updateTicker(c, arr[arr.length-2]);
  setStatus('live','ao vivo');
}

function updateTicker(cur, prev){
  if(!cur) return;
  const px=$('#px'); px.textContent = cur.close.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  px.classList.remove('flash'); void px.offsetWidth; px.classList.add('flash');
  if(prev){
    const d = cur.close-prev.close, pct = d/prev.close*100;
    const chg=$('#chg'); chg.className='chg mono '+(d>=0?'up':'down');
    chg.textContent = (d>=0?'+':'')+pct.toFixed(2)+'%';
  }
}

/* =========================================================================
   FERRAMENTAS DE DESENHO  (canvas sobreposto sincronizado)
   ========================================================================= */
const cv = $('#overlay'), ctx = cv.getContext('2d');
function resizeOverlay(){
  const r = stage.getBoundingClientRect(), dpr=window.devicePixelRatio||1;
  cv.width=r.width*dpr; cv.height=r.height*dpr; cv.style.width=r.width+'px'; cv.style.height=r.height+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize', resizeOverlay);

const xOf = t => chart.timeScale().timeToCoordinate(t);
const yOf = p => candleSeries.priceToCoordinate(p);
const FIB = [0,0.236,0.382,0.5,0.618,0.786,1];

function line(x1,y1,x2,y2,color,dash){
  ctx.save(); ctx.strokeStyle=color; ctx.lineWidth=1.4; ctx.setLineDash(dash||[]);
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); ctx.restore();
}
function dot(x,y){ ctx.save(); ctx.fillStyle=S.tool==='cursor'?'#41b3ff':'#f7931a'; ctx.beginPath(); ctx.arc(x,y,3,0,7); ctx.fill(); ctx.restore(); }
function tag(x,y,txt,color){
  ctx.save(); ctx.font="10px 'IBM Plex Mono', monospace"; ctx.fillStyle=color; ctx.textBaseline='middle';
  ctx.fillText(txt, x+4, y); ctx.restore();
}

function drawTrend(d, preview){
  const x1=xOf(d.points[0].time), y1=yOf(d.points[0].price);
  const x2=xOf(d.points[1].time), y2=yOf(d.points[1].price);
  if(x1==null||x2==null||y1==null||y2==null) return;
  // estende para a direita
  const w=cv.clientWidth; let ex=x2, ey=y2;
  if(x2!==x1){ const m=(y2-y1)/(x2-x1); ex=w; ey=y1+m*(w-x1); }
  line(x1,y1,ex,ey, preview?'#41b3ff88':'#41b3ff');
  if(!preview){ dot(x1,y1); dot(x2,y2); }
}
function drawHLine(d){
  const y=yOf(d.price); if(y==null) return;
  line(0,y,cv.clientWidth,y,'#41b3ffcc',[6,4]);
  tag(cv.clientWidth-88,y-8, d.price.toLocaleString('en-US',{maximumFractionDigits:2}), '#41b3ff');
}
function drawFib(d, preview){
  const p1=d.points[0], p2=d.points[1];
  const x1=xOf(p1.time), x2=xOf(p2.time); if(x1==null||x2==null) return;
  const left=Math.min(x1,x2), right=cv.clientWidth;
  for(const lv of FIB){
    const price = p1.price + (p2.price-p1.price)*lv;
    const y=yOf(price); if(y==null) continue;
    const col = lv===0||lv===1 ? '#41b3ff' : lv===0.618 ? '#f7931a' : '#41b3ff88';
    line(left,y,right,y,col,[3,3]);
    tag(left, y-7, lv.toFixed(3)+'  '+price.toLocaleString('en-US',{maximumFractionDigits:2}), col);
  }
  if(!preview){ const y1=yOf(p1.price),y2=yOf(p2.price); if(y1!=null)dot(x1,y1); if(y2!=null)dot(x2,y2); }
}
function drawChannel(d, preview){
  const [p1,p2,p3]=d.points;
  const x1=xOf(p1.time),y1=yOf(p1.price),x2=xOf(p2.time),y2=yOf(p2.price);
  if(x1==null||x2==null||y1==null||y2==null) return;
  const w=cv.clientWidth; let ex=w,ey=y2;
  if(x2!==x1){ const m=(y2-y1)/(x2-x1); ey=y1+m*(w-x1); }
  // deslocamento em pixels (escala de preço linear)
  let dy=0;
  if(p3){ const base=yOf(p1.price), off=yOf(p1.price+(p3.price - (p1.price+((p2.price-p1.price)/(p2.time-p1.time))*(p3.time-p1.time)))); if(base!=null&&off!=null) dy=off-base; }
  // faixa preenchida
  if(dy!==0){
    ctx.save(); ctx.fillStyle='rgba(65,179,255,.08)';
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(w,ey); ctx.lineTo(w,ey+dy); ctx.lineTo(x1,y1+dy); ctx.closePath(); ctx.fill(); ctx.restore();
  }
  line(x1,y1,w,ey, preview?'#41b3ff88':'#41b3ff');
  if(dy!==0) line(x1,y1+dy,w,ey+dy, preview?'#41b3ff66':'#41b3ffaa');
  if(!preview){ dot(x1,y1); dot(x2,y2); if(p3){const y3=yOf(p3.price); if(y3!=null)dot(xOf(p3.time),y3);} }
}

/* =========================================================================
   ORDER BLOCKS VOLUMÉTRICOS — porte do Pine "FAIXA DE ORDERBLOCK v2"
   Tipo (c) do briefing: calcula pivôs de volume sobre S.candles e desenha
   zonas (caixas) no canvas de overlay, com direção/força/status ao vivo.

   Matemática espelha o Pine:
     • dir  = high[len]>highest(len) ? -1 : low[len]<lowest(len) ? 1 : dir
     • gatilho = pivô de volume (centro > len barras de cada lado)
     • zona (Length) = ATR a partir do corpo; (Full) = candle inteiro
     • força = 0.6·volRelativo + 0.4·frescor ,  frescor = 1/(1+testes·0.5)
     • status relativo ao close atual, com folga 'farmult'
   ========================================================================= */
const OB = {
  cfg:{ on:false, len:5, count:5, miti:'Close', mode:'Length', farmult:1.0 },
  bull:[], bear:[],

  // ATR estilo Pine (ta.rma do True Range, semente = SMA dos primeiros len)
  atrSeries(c, len){
    const tr = c.map((x,i)=> i===0 ? x.high-x.low
        : Math.max(x.high-x.low, Math.abs(x.high-c[i-1].close), Math.abs(x.low-c[i-1].close)));
    const out = new Array(c.length).fill(null);
    let prev=null;
    for(let i=0;i<tr.length;i++){
      if(i<len-1) continue;
      if(i===len-1){ let s=0; for(let k=0;k<len;k++) s+=tr[k]; prev=s/len; }
      else prev = (prev*(len-1)+tr[i])/len;
      out[i]=prev;
    }
    return out;
  },

  // pivô de volume: centro estritamente maior que os len de cada lado
  isVolPivot(c, p, len){
    const v=c[p].volume;
    for(let k=1;k<=len;k++){
      if(c[p-k].volume >= v) return false;
      if(c[p+k].volume >= v) return false;
    }
    return true;
  },

  compute(){
    const c=S.candles, {len,mode,miti}=this.cfg;
    this.bull=[]; this.bear=[];
    if(!this.cfg.on || c.length < 2*len+1) return;
    const atr=this.atrSeries(c,len);
    let dir=0;
    const bull=[], bear=[];
    for(let i=0;i<c.length;i++){
      if(i>=len){
        let up=-Infinity, dn=Infinity;
        for(let k=i-len+1;k<=i;k++){ if(c[k].high>up)up=c[k].high; if(c[k].low<dn)dn=c[k].low; }
        const hb=c[i-len].high, lb=c[i-len].low;
        dir = hb>up ? -1 : lb<dn ? 1 : dir;
      }
      const p=i-len;
      if(p-len>=0 && this.isVolPivot(c,p,len)){
        const a=atr[p], pc=c[p];
        if(a!=null && dir===1){
          const btm=pc.low, top = mode==='Length' ? Math.min(pc.low+a, pc.high) : pc.high;
          bull.unshift({top,btm,avg:(top+btm)/2, loc:pc.time, vol:pc.volume, bias:1, startIdx:i});
        } else if(a!=null && dir===-1){
          const top=pc.high, btm = mode==='Length' ? Math.max(pc.high-a, pc.low) : pc.low;
          bear.unshift({top,btm,avg:(top+btm)/2, loc:pc.time, vol:pc.volume, bias:-1, startIdx:i});
        }
      }
      // mitigação contra a barra i (só a partir da barra seguinte à criação)
      const bar=c[i];
      for(let k=bull.length-1;k>=0;k--){
        const o=bull[k]; if(i<=o.startIdx) continue;
        const broke = miti==='Close' ? Math.min(bar.close,bar.open)<o.btm : miti==='Wick' ? bar.low<o.btm : bar.low<o.avg;
        if(broke) bull.splice(k,1);
      }
      for(let k=bear.length-1;k>=0;k--){
        const o=bear[k]; if(i<=o.startIdx) continue;
        const broke = miti==='Close' ? Math.max(bar.close,bar.open)>o.top : miti==='Wick' ? bar.high>o.top : bar.high>o.avg;
        if(broke) bear.splice(k,1);
      }
    }
    this.finalize(bull); this.finalize(bear);
    this.hideOverlap(bull); this.hideOverlap(bear);
    this.bull=bull; this.bear=bear;
  },

  // testes (visitas) + força, por lado
  finalize(list){
    const c=S.candles;
    let maxV=0; for(const o of list) if(o.vol>maxV) maxV=o.vol;
    for(const o of list){
      let tests=0, wasInside=false;
      for(let i=o.startIdx;i<c.length;i++){
        const inZone = c[i].high>o.btm && c[i].low<o.top;
        if(inZone && !wasInside){ tests++; wasInside=true; }
        if(!inZone) wasInside=false;
      }
      o.tests=tests;
      const volScore = maxV>0 ? o.vol/maxV : 0;
      const freshScore = 1/(1+tests*0.5);
      o.strength = (volScore*0.6 + freshScore*0.4)*100;
    }
  },

  // esconde sobreposição, preservando o mais recente (index 0)
  hideOverlap(list){
    if(list.length<2) return;
    const cur=list[0];
    for(let i=list.length-1;i>=1;i--){
      const s=list[i];
      if( (s.btm>cur.btm && s.btm<cur.top) ||
          (s.top<cur.top && s.btm>cur.btm) ||
          (s.top>cur.top && s.btm<cur.btm) ||
          (s.top<cur.top && s.top>cur.btm) ) list.splice(i,1);
    }
  },

  status(o){
    const c=S.candles; const close = c.length ? c[c.length-1].close : 0;
    const h=o.top-o.btm, fm=this.cfg.farmult;
    if(o.bias===1){
      if(close>=o.top){ const f=h>0?(close-o.top)/h:0; return f>fm?['🟢 Intacta','#26a69a']:['🟡 Próxima','#f7d33f']; }
      if(close>=o.btm) return ['🟠 Em teste','#f7931a'];
      return ['🔴 Rompida','#ef5350'];
    } else {
      if(close<=o.btm){ const f=h>0?(o.btm-close)/h:0; return f>fm?['🟢 Intacta','#26a69a']:['🟡 Próxima','#f7d33f']; }
      if(close<=o.top) return ['🟠 Em teste','#f7931a'];
      return ['🔴 Rompida','#ef5350'];
    }
  },

  stars(n){ let s=''; for(let i=1;i<=5;i++) s+= i<=n?'★':'☆'; return s; },

  draw(){
    if(!this.cfg.on) return;
    let rsw=0; try{ rsw=chart.priceScale('right').width()||0; }catch(_){}
    const rightEdge = cv.clientWidth - rsw - 1;   // não invade a escala de preços à direita
    const shown=[ ...this.bull.slice(0,this.cfg.count), ...this.bear.slice(0,this.cfg.count) ];
    for(const o of shown){
      let x1=xOf(o.loc); if(x1==null||x1<0) x1=0;
      const yT=yOf(o.top), yB=yOf(o.btm), yA=yOf(o.avg);
      if(yT==null||yB==null) continue;
      const bull=o.bias===1;
      ctx.save();
      ctx.fillStyle = bull?'rgba(38,166,154,.10)':'rgba(239,83,80,.10)';
      ctx.fillRect(x1,yT,rightEdge-x1,yB-yT);
      ctx.strokeStyle = bull?'rgba(38,166,154,.55)':'rgba(239,83,80,.55)';
      ctx.lineWidth=1; ctx.strokeRect(x1+.5,yT+.5,rightEdge-x1-1,yB-yT-1);
      ctx.restore();
      const [stxt,scol]=this.status(o);
      if(yA!=null) line(x1, yA, rightEdge, yA, scol, [5,4]);
      const frc=Math.round(o.strength);
      const l1=(bull?'▲ COMPRA':'▼ VENDA')+'  '+this.stars(Math.round(o.strength/20))+' '+frc+'%';
      this.label(rightEdge, yA==null?(yT+yB)/2:yA, [l1, stxt], scol);
    }
  },

  label(rightX, y, lines, col){
    ctx.save();
    ctx.font="9px 'IBM Plex Mono', monospace";
    let wmax=0; for(const t of lines){ const m=ctx.measureText(t).width; if(m>wmax)wmax=m; }
    const padX=5, padY=3, lh=11, bw=wmax+padX*2, bh=lines.length*lh+padY*2;
    let x=rightX-bw-4, yy=y-bh/2;
    if(yy<2) yy=2; if(yy+bh>cv.clientHeight-2) yy=cv.clientHeight-2-bh;
    ctx.beginPath();
    const r=5;
    ctx.moveTo(x+r,yy); ctx.arcTo(x+bw,yy,x+bw,yy+bh,r); ctx.arcTo(x+bw,yy+bh,x,yy+bh,r);
    ctx.arcTo(x,yy+bh,x,yy,r); ctx.arcTo(x,yy,x+bw,yy,r); ctx.closePath();
    ctx.fillStyle='rgba(13,18,27,.88)'; ctx.fill();
    ctx.strokeStyle=col; ctx.lineWidth=1; ctx.stroke();
    ctx.fillStyle=col; ctx.textBaseline='middle';
    lines.forEach((t,i)=> ctx.fillText(t, x+padX, yy+padY+lh*i+lh/2));
    ctx.restore();
  }
};

function redraw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  OB.draw();
  for(const d of S.drawings){
    if(d.type==='trend') drawTrend(d);
    else if(d.type==='hline') drawHLine(d);
    else if(d.type==='fib') drawFib(d);
    else if(d.type==='channel') drawChannel(d);
  }
  // alças do desenho selecionado (modo cursor)
  if(S.sel!=null && S.drawings[S.sel]){
    const d=S.drawings[S.sel];
    const anchors = d.type==='hline'
      ? [{x:cv.clientWidth-56, y:yOf(d.price)}]
      : d.points.map(ptPx);
    for(const a of anchors){
      if(!a || a.x==null || a.y==null) continue;
      ctx.save(); ctx.fillStyle='#0a0d13'; ctx.strokeStyle='#41b3ff'; ctx.lineWidth=1.6;
      ctx.beginPath(); ctx.rect(a.x-4.5, a.y-4.5, 9, 9); ctx.fill(); ctx.stroke(); ctx.restore();
    }
  }
  // pré-visualização enquanto coloca pontos
  if(S.pending.length && S.hover){
    const pts=[...S.pending, S.hover];
    if(S.tool==='trend' && pts.length>=2) drawTrend({points:[pts[0],pts[1]]}, true);
    if(S.tool==='fib'   && pts.length>=2) drawFib({points:[pts[0],pts[1]]}, true);
    if(S.tool==='channel'){
      if(pts.length===2) drawTrend({points:[pts[0],pts[1]]}, true);
      else if(pts.length>=3) drawChannel({points:[pts[0],pts[1],pts[2]]}, true);
    }
    for(const p of S.pending){ const x=xOf(p.time),y=yOf(p.price); if(x!=null&&y!=null) dot(x,y); }
  }
  requestAnimationFrame(redraw);
}
requestAnimationFrame(redraw);

/* =========================================================================
   INTERAÇÃO DE DESENHO — pointer events (mouse + toque unificados)
   Modelo estilo TradingView:
   • ferramenta ativa → 1º toque ARMA e a figura já segue o cursor/dedo em
     preview; 2º toque FIXA. (Também aceita arrastar direto: pressiona-desliza-solta.)
   • no modo cursor → tocar num desenho SELECIONA (aparecem as alças);
     arrastar uma alça move o ponto, arrastar o corpo move tudo.
   ========================================================================= */
S.sel = null;   // índice do desenho selecionado (modo cursor)
S.drag = null;  // operação de arraste em andamento

// pixel (relativo ao gráfico) -> âncora {time, price}
function pxToPt(x, y){
  const price = candleSeries.coordinateToPrice(y);
  const time  = chart.timeScale().coordinateToTime(x);
  if(price==null || time==null) return null;
  return {time, price};
}
// âncora -> pixel
function ptPx(p){ const x=xOf(p.time), y=yOf(p.price); return (x==null||y==null)?null:{x,y}; }

// distância de um ponto ao segmento AB (em pixels)
function segDist(px,py,ax,ay,bx,by){
  const dx=bx-ax, dy=by-ay, L2=dx*dx+dy*dy;
  let t = L2 ? ((px-ax)*dx+(py-ay)*dy)/L2 : 0; t=Math.max(0,Math.min(1,t));
  return Math.hypot(px-(ax+t*dx), py-(ay+t*dy));
}
// que parte de um desenho está sob (px,py)?  'h0'/'h1'/'h2' = alça, 'body' = corpo
function hitPart(d, px, py){
  const TOL = 11;
  if(d.type==='hline'){ const y=yOf(d.price); return (y!=null && Math.abs(py-y)<TOL) ? 'body' : null; }
  const pts = d.points.map(ptPx);
  for(let i=0;i<pts.length;i++){ const q=pts[i]; if(q && Math.hypot(px-q.x,py-q.y)<TOL+3) return 'h'+i; }
  for(let i=0;i<pts.length-1;i++){ const a=pts[i],b=pts[i+1]; if(a&&b && segDist(px,py,a.x,a.y,b.x,b.y)<TOL) return 'body'; }
  return null;
}
function hitAny(px,py){
  for(let i=S.drawings.length-1;i>=0;i--){ if(hitPart(S.drawings[i],px,py)) return i; }
  return -1;
}

function selectDrawing(i){ S.sel=i; cv.style.pointerEvents='auto'; }
function deselect(){ S.sel=null; if(S.tool==='cursor') cv.style.pointerEvents='none'; }

// seleção por clique (só no modo cursor com nada selecionado — aí o overlay deixa passar)
chart.subscribeClick(param=>{
  if(S.tool!=='cursor' || !param.point) return;
  const i = hitAny(param.point.x, param.point.y);
  if(i>=0) selectDrawing(i); else deselect();
});

function tryFinalize(){
  const need = S.tool==='channel' ? 3 : 2;
  if(S.pending.length >= need){
    S.drawings.push({type:S.tool, points:S.pending.slice(0,need)});
    const idx=S.drawings.length-1;
    S.pending=[]; store.save();
    setTool('cursor'); selectDrawing(idx);   // já deixa selecionado p/ ajustar
  }
}
function applyHandle(pt){
  const d=S.drawings[S.sel]; if(!d) return;
  if(d.type==='hline'){ d.price=pt.price; }
  else { d.points[+S.drag.part.slice(1)] = {time:pt.time, price:pt.price}; }
}
function applyMove(pt){
  const d=S.drawings[S.sel], o=S.drag.orig; if(!d) return;
  const dt = pt.time - S.drag.start.time, dp = pt.price - S.drag.start.price;
  if(d.type==='hline'){ d.price = o.price + dp; }
  else { d.points = o.points.map(p=>({time:p.time+dt, price:p.price+dp})); }
}

function onDown(e){
  const pt = pxToPt(e.offsetX, e.offsetY);
  if(S.tool!=='cursor'){                    // ----- MODO DESENHO -----
    if(!pt) return;
    if(S.tool==='hline'){ S.drawings.push({type:'hline', price:pt.price}); const i=S.drawings.length-1; store.save(); setTool('cursor'); selectDrawing(i); return; }
    if(S.pending.length===0){ S.pending=[pt]; S.drag={kind:'new', downX:e.offsetX, downY:e.offsetY}; }
    else { S.drag={kind:'newtap'}; }
    S.hover=pt;
    return;
  }
  if(S.sel!=null){                          // ----- MODO CURSOR c/ seleção -----
    const d=S.drawings[S.sel], part=hitPart(d, e.offsetX, e.offsetY);
    if(part && part[0]==='h') S.drag={kind:'handle', part};
    else if(part==='body')   S.drag={kind:'move', start:pt, orig:JSON.parse(JSON.stringify(d))};
    else deselect();
  }
}
function onMove(e){
  const pt = pxToPt(e.offsetX, e.offsetY);
  if(S.drag){
    if(!pt) return;
    if(S.drag.kind==='new'||S.drag.kind==='newtap') S.hover=pt;
    else if(S.drag.kind==='handle') applyHandle(pt);
    else if(S.drag.kind==='move')   applyMove(pt);
    return;
  }
  if(S.tool!=='cursor' && S.pending.length && pt) S.hover=pt;  // preview do mouse entre toques
}
function onUp(e){
  const d=S.drag; if(!d){ return; }
  const pt = pxToPt(e.offsetX, e.offsetY);
  if(d.kind==='new'){
    const moved = Math.hypot(e.offsetX-d.downX, e.offsetY-d.downY) > 6;
    if(moved && pt){ S.pending.push(pt); tryFinalize(); }   // arrastou = 2 pontos
    // se foi só toque: p0 fica armado, aguarda próximo toque
  } else if(d.kind==='newtap'){
    if(pt){ S.pending.push(pt); tryFinalize(); }
  } else if(d.kind==='handle' || d.kind==='move'){ store.save(); }
  S.drag=null;
}
cv.addEventListener('pointerdown', e=>{ if(cv.style.pointerEvents==='none') return; try{ cv.setPointerCapture(e.pointerId); }catch(_){} onDown(e); });
cv.addEventListener('pointermove', onMove);
cv.addEventListener('pointerup',   onUp);
cv.addEventListener('pointercancel', ()=>{ S.drag=null; });

// bloqueia o zoom de PÁGINA por gesto (iOS Safari) — o do gráfico continua funcionando
['gesturestart','gesturechange','gestureend'].forEach(ev=>
  document.addEventListener(ev, e=>e.preventDefault(), {passive:false}));

/* =========================================================================
   UI / EVENTOS
   ========================================================================= */
function setTool(t){
  S.tool=t; S.pending=[]; S.drag=null;
  document.querySelectorAll('.tool[data-tool]').forEach(b=>b.classList.toggle('active', b.dataset.tool===t));
  const draw = t!=='cursor';
  chart.applyOptions({ handleScroll:!draw, handleScale:!draw });
  if(draw){ S.sel=null; cv.style.pointerEvents='auto'; }   // ferramenta captura os gestos
  else    { cv.style.pointerEvents = S.sel!=null ? 'auto' : 'none'; } // cursor: só captura se há seleção
}

// ---- Order Blocks (toggle e parâmetros ao vivo, estilo TradingView) ----
function syncOB(){
  OB.cfg.on    = $('#obOn').checked;
  OB.cfg.len   = Math.max(1, Math.min(20, +$('#obLen').value||5));
  OB.cfg.count = Math.max(1, Math.min(20, +$('#obCount').value||5));

$('#obLen').addEventListener('change', syncOB);
$('#obCount').addEventListener('change', syncOB);
$('#obMiti').addEventListener('change', syncOB);
$('#bannerBtn').addEventListener('click', ()=>{
  S.source = S.source==='binance'?'bybit':'binance';
  $('#src').value=S.source; store.save(); loadData();
});

document.addEventListener('keydown', e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT') return;
  if(e.key==='Escape'){ toggleIndMenu(false); }
  if(e.key==='Delete'||e.key==='Backspace'){
    if(S.sel!=null){ S.drawings.splice(S.sel,1); deselect(); }
    else S.drawings.pop();
    store.save();
  }
});

/* redimensiona overlay quando o chart muda de tamanho */
new ResizeObserver(resizeOverlay).observe(stage);

/* =========================================================================
   BOOT
   ========================================================================= */
(function init(){
  const saved=store.load();
  if(saved.tf){ S.tf=saved.tf; document.querySelectorAll('.tf').forEach(x=>x.classList.toggle('active',x.dataset.tf===S.tf)); }
  if(saved.source){ S.source=saved.source; $('#src').value=S.source; }
  if(Array.isArray(saved.drawings)) S.drawings=saved.drawings;
  if(saved.ob){ Object.assign(OB.cfg, saved.ob);
    $('#obOn').checked=OB.cfg.on; $('#obLen').value=OB.cfg.len;
    $('#obCount').value=OB.cfg.count; $('#obMiti').value=OB.cfg.miti; }
  resizeOverlay();
  loadData();
})();
</script>
</body>
</html>
