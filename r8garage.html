}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--ink); font-size:12.5px; line-height:1.48;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
}
.tnum{font-variant-numeric:tabular-nums}
button{font-family:inherit;cursor:pointer}
a{color:inherit}
input,select,textarea{font-family:inherit;font-size:12.5px}

/* ===================== APP SHELL ===================== */
.app{display:grid;grid-template-columns:236px 1fr;min-height:100vh}
.sidebar{
  background:var(--surface);border-right:1px solid var(--hair);padding:16px 12px;
  position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:4px;
}
.brand{display:flex;flex-direction:column;align-items:flex-start;gap:3px;padding:4px 6px 14px}
.brandlogo{width:100%;max-width:190px;aspect-ratio:560/190;background:var(--r8logo) left center/contain no-repeat}
.brand .cap{font-size:10.5px;color:var(--muted-2);letter-spacing:.06em;text-transform:uppercase;font-weight:600;padding-left:3px}
.nav{display:flex;flex-direction:column;gap:2px;margin-top:4px}
.nav button{
  display:flex;align-items:center;gap:11px;width:100%;text-align:left;border:none;background:none;
  color:var(--muted);padding:8px 11px;border-radius:10px;font-size:13px;font-weight:500;transition:.12s;
}
.nav button svg{width:18px;height:18px;flex:none;stroke-width:1.9}
.nav button:hover{background:var(--surface-2);color:var(--ink)}
.nav button.active{background:var(--primary-soft);color:var(--primary);font-weight:650}
.nav .badge{margin-left:auto;background:var(--warn);color:#fff;font-size:11px;font-weight:700;
  min-width:19px;height:19px;border-radius:10px;display:grid;place-items:center;padding:0 5px}
.side-foot{margin-top:auto;display:flex;flex-direction:column;gap:8px;padding:8px 6px 2px;border-top:1px solid var(--hair)}
.side-foot .row{display:flex;gap:8px}
.mini-btn{flex:1;border:1px solid var(--hair);background:var(--surface);color:var(--muted);
  border-radius:8px;padding:7px;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px}
.mini-btn:hover{border-color:var(--hair-2);color:var(--ink)}
.mini-btn svg{width:14px;height:14px}
.pal-dot{width:12px;height:12px;border-radius:50%;flex:none;box-shadow:0 0 0 2px var(--surface),0 0 0 3px var(--hair-2)}

/* main */
.main{min-width:0;display:flex;flex-direction:column}
.topbar{
  position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 82%,transparent);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--hair);
  display:flex;align-items:center;gap:12px;padding:12px 20px;
}
.topbar h1{font-size:15.5px;margin:0;font-weight:700;letter-spacing:-.01em}
.topbar .sub{font-size:11.5px;color:var(--muted-2);margin-top:1px}
.topbar .spacer{flex:1}
.topbar-logo{width:102px;aspect-ratio:560/190;background:var(--r8logo) center/contain no-repeat;flex:none;margin-left:2px}
@media (min-width:961px){ .topbar-logo{display:none} }  /* no desktop a logo já está na barra lateral */
.btn{
  display:inline-flex;align-items:center;gap:8px;border:1px solid var(--hair);background:var(--surface);
  color:var(--ink);padding:8px 13px;border-radius:10px;font-size:13px;font-weight:600;transition:.12s;white-space:nowrap;
}
.btn:hover{border-color:var(--hair-2)}
.btn svg{width:16px;height:16px;stroke-width:2}
.btn.primary{background:var(--primary);border-color:var(--primary);color:var(--primary-ink)}
.btn.primary:hover{filter:brightness(1.06)}
.btn.ghost{background:none;border-color:transparent}
.btn.danger{color:var(--red);border-color:transparent}
.btn.danger:hover{background:color-mix(in srgb,var(--red) 12%,transparent)}
.btn.sm{padding:6px 10px;font-size:13px;border-radius:8px}
.content{padding:16px;max-width:1180px;width:100%;margin:0 auto;flex:1}

/* mobile top / bottom nav */
.menu-btn{display:none}
.bottomnav{display:none}

/* ===================== COMPONENTS ===================== */
.grid{display:grid;gap:14px}
.kpis{grid-template-columns:repeat(4,1fr)}
.card{background:var(--surface);border:1px solid var(--hair);border-radius:var(--radius);box-shadow:var(--shadow)}
.card.pad{padding:13px}
.kpi{padding:12px 13px;display:flex;flex-direction:column;gap:2px;position:relative;overflow:hidden}
.kpi .lbl{font-size:11px;color:var(--muted-2);font-weight:600;letter-spacing:.02em;text-transform:uppercase}
.kpi .val{font-size:18px;font-weight:750;letter-spacing:-.02em;line-height:1.1}
.kpi .delta{font-size:12px;color:var(--muted);margin-top:2px}
.kpi .ic{position:absolute;right:14px;top:14px;width:30px;height:30px;border-radius:9px;display:grid;place-items:center;
  background:var(--primary-soft);color:var(--primary)}
.kpi .ic svg{width:17px;height:17px;stroke-width:2}

.section-h{display:flex;align-items:center;gap:10px;margin:22px 2px 12px}
.section-h h2{font-size:13.5px;margin:0;font-weight:700}
.section-h .spacer{flex:1}

.chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:650;padding:2px 9px;border-radius:999px;
  border:1px solid transparent;white-space:nowrap}
.chip .dot{width:7px;height:7px;border-radius:50%}
.st-orcamento{background:color-mix(in srgb,var(--st-orcamento) 14%,transparent);color:var(--st-orcamento)}
.st-aguardando{background:color-mix(in srgb,var(--st-aguardando) 16%,transparent);color:var(--st-aguardando)}
.st-em_servico{background:color-mix(in srgb,var(--st-em_servico) 16%,transparent);color:var(--st-em_servico)}
.st-pronto{background:color-mix(in srgb,var(--st-pronto) 14%,transparent);color:var(--st-pronto)}
.st-entregue{background:color-mix(in srgb,var(--st-entregue) 15%,transparent);color:var(--st-entregue)}
.st-recusado{background:color-mix(in srgb,var(--st-recusado) 14%,transparent);color:var(--st-recusado)}

/* table */
.table-wrap{overflow-x:auto;border-radius:var(--radius)}
table.tbl{width:100%;border-collapse:collapse;font-size:12.5px}
table.tbl th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted-2);
  font-weight:700;padding:9px 12px;border-bottom:1px solid var(--hair);white-space:nowrap}
table.tbl td{padding:9px 12px;border-bottom:1px solid var(--hair);vertical-align:middle}
table.tbl tr:last-child td{border-bottom:none}
table.tbl tbody tr:hover,table.tbl tr.click:hover{background:var(--surface-2);cursor:pointer}
.muted{color:var(--muted)}
.mono{font-variant-numeric:tabular-nums}
.right{text-align:right}
.pill-veh{font-size:12px;color:var(--muted);background:var(--surface-2);border:1px solid var(--hair);
  padding:2px 8px;border-radius:6px;font-weight:600;display:inline-block}

/* filters */
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.fchip{border:1px solid var(--hair);background:var(--surface);color:var(--muted);padding:6px 12px;border-radius:999px;
  font-size:13px;font-weight:600}
.fchip.active{background:var(--ink);color:var(--surface);border-color:var(--ink)}
.seg{display:inline-flex;border:1px solid var(--hair);border-radius:9px;overflow:hidden;background:var(--surface)}
.seg button{border:none;background:none;padding:7px 12px;font-size:13px;font-weight:600;color:var(--muted)}
.seg button.active{background:var(--primary);color:#fff}

/* kanban */
.kanban{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(250px,1fr);gap:12px;overflow-x:auto;padding-bottom:6px}
.kcol{background:var(--surface-2);border:1px solid var(--hair);border-radius:var(--radius);padding:10px;min-height:120px;display:flex;flex-direction:column;gap:9px}
.kcol.drop{outline:2px dashed var(--primary);outline-offset:-3px}
.kcol-h{display:flex;align-items:center;gap:8px;padding:2px 4px 4px;font-size:13px;font-weight:700}
.kcol-h .count{margin-left:auto;font-size:12px;color:var(--muted-2);background:var(--surface);border:1px solid var(--hair);
  border-radius:999px;padding:1px 8px}
.kcol-h .bar{width:8px;height:8px;border-radius:2px}
.kcard{background:var(--surface);border:1px solid var(--hair);border-radius:11px;padding:11px;box-shadow:var(--shadow);
  cursor:grab;display:flex;flex-direction:column;gap:6px}
.kcard:active{cursor:grabbing}
.kcard.dragging{opacity:.5}
.kcard .knum{font-size:12px;color:var(--muted-2);font-weight:700}
.kcard .kcli{font-weight:650;font-size:13px}
.kcard .kmeta{display:flex;align-items:center;gap:8px;justify-content:space-between}
.kcard .ktot{font-weight:700;font-variant-numeric:tabular-nums}

/* forms / modal */
.modal-back{position:fixed;inset:0;background:rgba(10,15,25,.5);backdrop-filter:blur(3px);z-index:60;display:flex;
  align-items:flex-end;justify-content:center;padding:0}
@media(min-width:721px){.modal-back{align-items:center;padding:24px}}
/* diálogo de confirmação (fica ACIMA de qualquer modal) */
.confirm-back{position:fixed;inset:0;background:rgba(8,10,16,.55);backdrop-filter:blur(3px);z-index:80;display:flex;align-items:center;justify-content:center;padding:18px}
.confirm-box{background:var(--surface);border:1px solid var(--hair);border-radius:16px;max-width:430px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden}
.confirm-box .ch{display:flex;align-items:center;gap:11px;padding:18px 20px 6px}
.confirm-box .ci{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;flex:none}
.confirm-box .ci svg{width:20px;height:20px;stroke-width:2}
.confirm-box h3{margin:0;font-size:16px;font-weight:750}
.confirm-box .cb{padding:4px 20px 16px;color:var(--muted);font-size:13.5px;line-height:1.5}
.confirm-box .cb b{color:var(--ink)}
.confirm-box .cf{display:flex;gap:9px;justify-content:flex-end;padding:0 18px 16px}

.paytag{font-size:11px;font-weight:700;white-space:nowrap}
.paytag.ok{color:var(--st-entregue)}
.paytag.due{color:var(--warn)}
.parc-list{display:flex;flex-direction:column;gap:5px;margin:8px 0 2px}
.parc-row{display:flex;align-items:center;gap:10px;padding:7px 10px;border:1px solid var(--hair);border-radius:9px;background:var(--surface-2);font-size:13px}
.parc-row .parc-box{width:20px;height:20px;flex:none;border-radius:6px;border:2px solid var(--muted-2);display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:800}

/* catálogo (config) */

/* selo de cliente bom */

/* relatório: barras horizontais de serviços */

/* detail */

.search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--muted-2)}

  padding:12px 20px;border-radius:11px;font-weight:600;font-size:14px;opacity:0;transition:.25s;z-index:100;box-shadow:var(--shadow);pointer-events:none}

.bars{display:flex;align-items:flex-end;gap:9px;height:140px;padding-top:8px}
.bars .b{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:6px;min-width:0}

  .topbar{padding:11px 14px}
  .topbar h1{font-size:15.5px}

  .kpi .val{font-size:18px}
  .hide-sm{display:none !important}
  .bottomnav{
    display:flex;position:fixed;bottom:0;left:0;right:0;z-index:40;background:var(--surface);
    border-top:1px solid var(--hair);padding:6px 6px calc(6px + env(safe-area-inset-bottom));justify-content:space-around}
  .bottomnav button{border:none;background:none;color:var(--muted-2);display:flex;flex-direction:column;align-items:center;gap:3px;
    font-size:10.5px;font-weight:600;padding:5px 8px;border-radius:9px;flex:1}
  .bottomnav button svg{width:21px;height:21px;stroke-width:1.9}

    background:var(--primary);color:#fff;border:none;display:grid;place-items:center;box-shadow:0 6px 20px rgba(47,107,214,.45)}

}

<body>

  <div class="side-foot" style="margin-top:auto">
    <button class="mini-btn" data-act="mode" style="width:100%"><span class="pal-dot" id="modeDot2"></span>Modo: <b id="modeName2" style="margin-left:3px;color:var(--ink)">Claro</b></button>
    <button class="mini-btn" data-act="reset" style="width:100%">Zerar dados</button>

<script>
/* =========================================================================
   OFICINA — app de gestão de serviços (single-file, dados no localStorage)
   Módulos: OS (entrada/saída) · Orçamento→aprovação · Clientes+histórico ·
   Estoque de peças (baixa automática) · Kanban · Financeiro em ¥ ienes.
   ========================================================================= */
const $ = s=>document.querySelector(s);
const uid = ()=> (crypto.randomUUID?crypto.randomUUID():Date.now()+'-'+Math.random().toString(36).slice(2,8));
const yen = n=> '¥'+Math.round(n||0).toLocaleString('en-US');
const nowISO = ()=> new Date().toISOString();
const fmtDate = iso=>{ if(!iso) return '—'; const d=new Date(iso); return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'}); };
const fmtDateTime = iso=>{ if(!iso) return '—'; const d=new Date(iso); return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); };
const esc = s=> (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
// campo de dinheiro: prefixo ¥ e VAZIO por padrão (sem o zero chato)
function moneyField(attrs, val, mini){
  const v=(val==null||val===''||+val===0)?'':val;
  return `<div class="moneywrap${mini?' mini':''}"><input type="number" min="0" inputmode="decimal" placeholder="0" ${attrs} value="${v}"></div>`;
}
// classifica um serviço (texto livre) numa categoria, p/ o relatório
const SERV_CATS=[
  ['Troca de óleo',/óleo|oleo|lubrific/i],
  ['Freios',/freio|pastilha|disco|sangria|lona/i],
  ['Suspensão',/suspens|amortec|mola|bandeja|piv[oô]|coxim/i],
  ['Motor',/motor|correia|vela|junta|retíf|retif|distribui|arrefec|radiador|bomba/i],
  ['Elétrica',/el[ée]tr|bateria|alternador|farol|l[âa]mpada|chicote|sensor|injec|inje[çc]/i],
  ['Revisão',/revis|inspe[çc]|checklist/i],
  ['Pneus/Alinhamento',/pneu|alinha|balancea|roda|calibr/i],
  ['Ar-condicionado',/ar.?cond|climatiz|compressor|g[áa]s.?ar/i],
  ['Funilaria/Pintura',/funilar|pintura|lataria|polimento|amassad|martel/i],
  ['Transmissão',/c[âa]mbio|embreagem|transmiss|diferencial/i],
];
function classifyService(desc){ for(const [cat,re] of SERV_CATS) if(re.test(desc||'')) return cat; return 'Outros'; }
// estatísticas do cliente + tier (bom cliente)
function clienteStats(cid){
  const os=ordensDe(cid).filter(o=>o.status==='entregue');
  const n=os.length, gasto=os.reduce((s,o)=>s+total(o),0);
  const lucro=os.reduce((s,o)=>{ const p=pagCalc(total(o),pagOf(o)); return s+total(o)-custoOS(o)-(p.isCard&&!p.repassar?p.taxa:0); },0);
  // selo baseado no LUCRO que o cliente dá à oficina
  let tier=null;
  if(lucro>=50000) tier='ouro'; else if(lucro>=18000) tier='prata';
  return {n,gasto,lucro,tier};
}
const TIER_OURO=50000, TIER_PRATA=18000;  // limites de lucro (¥) p/ os selos
function clienteBadge(tier){ return tier==='ouro'?'<span class="cbadge ouro">★ Ouro</span>':tier==='prata'?'<span class="cbadge prata">★ Prata</span>':''; }

const STATUS={
  orcamento:{label:'Orçamento',color:'var(--st-orcamento)'},
  aguardando:{label:'Aguardando',color:'var(--st-aguardando)'},
  em_servico:{label:'Em serviço',color:'var(--st-em_servico)'},
  pronto:{label:'Pronto',color:'var(--st-pronto)'},
  entregue:{label:'Entregue',color:'var(--st-entregue)'},
  recusado:{label:'Recusado',color:'var(--st-recusado)'},
};
const KANBAN=['orcamento','aguardando','em_servico','pronto','entregue'];
const COMB=['Gasolina','Diesel','Híbrido','Elétrico','Flex','GNV'];
const PAG={dinheiro:'Dinheiro',credito:'Cartão de crédito',debito:'Cartão de débito',transferencia:'Transferência bancária',paypay:'PayPay / QR',combinar:'A combinar'};
const PAG_EMO={dinheiro:'💴',credito:'💳',debito:'💳',transferencia:'🏦',paypay:'📱',combinar:'🤝'};
const pagLabel=k=>`${PAG_EMO[k]||''} ${PAG[k]||'—'}`.trim();
const TAXA_PADRAO=3.5;  // taxa média de cartão de crédito no Japão (%)
// forma de pagamento padrão de uma OS
function pagOf(o){ return o.pagamento || {forma:'dinheiro',parcelas:1,taxaPct:0,repassar:false,pago:false}; }
// data em que o pagamento foi recebido (regime de CAIXA). Fallback p/ dados antigos: data de entrega.
function pagoEmOf(o){ const p=pagOf(o); return p.pago ? (p.pagoEm || o.entregueEm || o.criadoEm) : null; }
// cálculo financeiro do pagamento: taxa do cartão = custo do comerciante (ou repassado)
function pagCalc(base,p){
  p=p||{}; const isCard=p.forma==='credito'||p.forma==='debito';
  const taxa=isCard ? base*(+p.taxaPct||0)/100 : 0;
  const cliente=p.repassar ? base+taxa : base;      // repassar = acréscimo ao cliente
  const liquido=p.repassar ? base : base-taxa;      // absorver = oficina banca a taxa
  const parc=Math.max(1,+p.parcelas||1);
  return {base,taxa,cliente,liquido,parc,parcela:cliente/parc,isCard,repassar:!!p.repassar,forma:p.forma||'dinheiro'};
}

/* ===== COMPRA & VENDA DE CARROS ===== */
const CAR_STATUS={
  estoque:{label:'Em estoque',color:'var(--st-aguardando)'},
  reservado:{label:'Reservado',color:'var(--st-orcamento)'},
  vendido:{label:'Vendido',color:'var(--st-pronto)'},
  entregue:{label:'Entregue',color:'var(--st-entregue)'},
  cancelado:{label:'Cancelado',color:'var(--st-recusado)'},
};
const CAR_STATUS_EMO={estoque:'📦',reservado:'🔖',vendido:'🤝',entregue:'✅',cancelado:'✖️'};
const CAR_ENTRADA={nenhuma:'Sem entrada',dinheiro:'Entrada em dinheiro',carro:'Carro na troca'};
const CAR_ENTRADA_EMO={nenhuma:'—',dinheiro:'💴',carro:'🚗'};
const CAR_FIN={avista:'À vista',cartao:'Cartão',parcelado:'Parcelado'};
const CAR_FIN_EMO={avista:'💴',cartao:'💳',parcelado:'📆'};
const carFinLabel=k=>`${CAR_FIN_EMO[k]||''} ${CAR_FIN[k]||'—'}`.trim();
const carro=id=>DB.carros.find(c=>c.id===id);
// cálculo financeiro de um negócio de carro
function carCalc(o){
  const venda=+o.precoVenda||0, aquis=+o.precoAquisicao||0, custos=+o.custosExtras||0;
  const ent=o.entrada||{tipo:'nenhuma',valor:0};
  const entradaValor=+ent.valor||0;
  const fin=o.fin||{forma:'avista'};
  const taxaPct=Math.max(0,+fin.taxaPct||0);            // taxa/imposto repassado ao cliente
  const acrescimo=Math.round(venda*taxaPct/100);        // valor adicional cobrado pela taxa
  const totalCliente=venda+acrescimo;                   // preço final que o cliente paga
  const restante=Math.max(0, totalCliente-entradaValor);// a financiar após a entrada
  const lucro=venda-aquis-custos;                        // lucro do negócio (taxa repassa, troca não é custo)
  const nParc=Math.max(1,+fin.nParcelas||1);
  const valorParcela=fin.forma==='parcelado' ? (+fin.valorParcela|| (restante/nParc)) : restante;
  const parcelasPagas=Math.max(0,Math.min(nParc,+o.parcelasPagas||0));
  // recebido em DINHEIRO (troca em carro é ativo, não caixa)
  const entradaCaixa = (ent.tipo==='dinheiro' && o.entradaPaga) ? entradaValor : 0;
  let recebido, aReceber;
  if(fin.forma==='parcelado'){ recebido=entradaCaixa + parcelasPagas*valorParcela; aReceber=restante - parcelasPagas*valorParcela; }
  else { recebido=entradaCaixa + (o.pago?restante:0); aReceber=(o.pago?0:restante) + (ent.tipo==='dinheiro'&&!o.entradaPaga?entradaValor:0); }
  const trocaAtivo = ent.tipo==='carro' ? entradaValor : 0;   // valor do carro recebido na troca
  const vendido = o.status==='vendido'||o.status==='entregue';
  return {venda,aquis,custos,entradaValor,acrescimo,totalCliente,taxaPct,restante,lucro,nParc,valorParcela,parcelasPagas,recebido,aReceber:Math.max(0,aReceber),trocaAtivo,vendido,forma:fin.forma};
}
// data de vencimento da parcela k (1-based): base da venda + k meses, no dia combinado
function parcelaVenc(o,k){
  const base=new Date(o.vendidoEm||o.criadoEm||Date.now());
  const dia=Math.min(28,Math.max(1,+((o.fin||{}).diaVenc)||5));
  return new Date(base.getFullYear(), base.getMonth()+k, dia).toISOString();
}
function isLate(iso){ const d=new Date(iso); d.setHours(23,59,59); return d.getTime()<Date.now(); }

function carWhatsMsg(o){
  const c=cliente(o.clienteId), cc=carCalc(o);

  L.push('🚗 *R8 Garage* — status do seu veículo');

  if(cc.acrescimo>0){ L.push('*Taxa ('+cc.taxaPct+'%):* '+yen(cc.acrescimo)); L.push('*Total:* '+yen(cc.totalCliente)); }
  if(cc.entradaValor>0) L.push('*Entrada '+(CAR_ENTRADA_EMO[(o.entrada||{}).tipo]||'')+':* '+yen(cc.entradaValor)+((o.entrada||{}).tipo==='carro'?' (troca)':''));
  L.push('');
  if(cc.forma==='parcelado'){
    L.push('*Parcelamento:* '+cc.nParc+'× de '+yen(cc.valorParcela));
    L.push('✅ *Pagas:* '+cc.parcelasPagas+'/'+cc.nParc+'  ('+yen(cc.recebido)+')');
    L.push('💰 *A receber:* '+yen(cc.aReceber));
    if(cc.parcelasPagas<cc.nParc){
      const k=cc.parcelasPagas+1, venc=parcelaVenc(o,k), late=isLate(venc);
      if(late) L.push('⚠️ Parcela '+k+' venceu em '+fmtDate(venc)+' — pedimos a gentileza de regularizar. 🙏');
      else L.push('📆 Próxima parcela ('+k+'): vence '+fmtDate(venc)+' — '+yen(cc.valorParcela));
    } else { L.push('🎉 Financiamento *quitado*. Muito obrigado!'); }
  } else {
    L.push('*Pagamento:* '+carFinLabel(cc.forma));
    if(cc.aReceber<=0) L.push('✅ *Quitado.* Muito obrigado!');
    else L.push('💰 *A receber:* '+yen(cc.aReceber));
  }
  return L.join('\n');
}

function mkCarro(cli,carro,aquisicao,custos,venda,entrada,fin,status,parcelasPagas,daysAgo){
  const criado=new Date(Date.now()+(daysAgo*86400000)).toISOString();
  const vendido=(status==='vendido'||status==='entregue')?criado:null;
  const restante=Math.max(0,venda-(entrada.valor||0));
  fin=Object.assign({forma:'avista',modo:'parcelas',nParcelas:1,valorParcela:0,diaVenc:5,taxaPct:fin&&fin.forma==='cartao'?3.5:0},fin);
  if(fin.forma==='parcelado'){ if(fin.modo==='valor'){ fin.nParcelas=Math.max(1,Math.ceil(restante/(fin.valorParcela||restante))); } else { fin.valorParcela=fin.nParcelas?Math.round(restante/fin.nParcelas):restante; } }
  const o={id:uid(),numero:DB.carSeq++,clienteId:cli?cli.id:null,carro,precoAquisicao:+aquisicao||0,custosExtras:+custos||0,
    precoVenda:+venda||0,entrada:Object.assign({tipo:'nenhuma',valor:0,trocaDesc:''},entrada),fin,
    parcelasPagas:+parcelasPagas||0,entradaPaga:status!=='estoque',status,criadoEm:criado,vendidoEm:vendido,
    hist:[{t:criado,txt:status==='estoque'?'Carro comprado no leilão':'Negócio criado'}]};
  DB.carros.push(o); return o;
}
function mkOS(c,v,status,rawItems,daysAgo,pagamento){

    : {id:uid(),tipo:'mao',desc:it.desc,qtd:it.qtd,preco:it.preco,custo:0});
  const criado=new Date(Date.now()+ (daysAgo*86400000)).toISOString();
  const o={id:uid(),numero:DB.seq++,clienteId:c.id,veiculoId:v.id,status,tipo:(status==='orcamento'?'orcamento':'os'),
    kmEntrada:v.km,previsao:new Date(Date.now()+2*86400000).toISOString().slice(0,10),obs:'',desconto:0,
    pagamento:pagamento||{forma:'dinheiro',parcelas:1,taxaPct:0,repassar:false,pago:false},
    itens,criadoEm:criado,entregueEm:(status==='entregue'?criado:null),consumido:false,
    hist:[{t:criado,txt:'OS criada'}]};
  if(o.pagamento.pago) o.pagamento.pagoEm = o.entregueEm || criado;   // pago no ato da entrega (exemplos)
  if(status==='entregue'){ o.hist.push({t:criado,txt:'Entregue ao cliente'}); }

}

  let r=0;
  for(const o of DB.ordens){ if(o.consumido) continue; if(!['aguardando','em_servico','pronto'].includes(o.status)) continue;
    for(const it of o.itens){ if(it.tipo==='peca'&&it.pecaId===pecaId) r+=it.qtd; } }
  return r;
}
const disponivel = p=> p.qtd - reservado(p.id);
// baixa/estorno simétricos (inversos exatos): sem clamp, pra estorno nunca "criar" estoque
function consumeStock(o){ if(o.consumido) return; for(const it of o.itens){ if(it.tipo==='peca'){ const p=peca(it.pecaId); if(p) p.qtd-=it.qtd; } } o.consumido=true; }
function restoreStock(o){ if(!o.consumido) return; for(const it of o.itens){ if(it.tipo==='peca'){ const p=peca(it.pecaId); if(p) p.qtd+=it.qtd; } } o.consumido=false; }

function setStatus(o,st){
  if(o.status===st) return;
  const prev=o.status; o.status=st; o.tipo = st==='orcamento'?'orcamento':'os';
  if(st==='entregue'){ o.entregueEm=nowISO(); consumeStock(o); }
  else if(prev==='entregue'){ o.entregueEm=null; restoreStock(o); }
  o.hist.push({t:nowISO(),txt:'Status → '+STATUS[st].label});
  save();
}

/* período p/ financeiro */
function inPeriod(iso,period){
  if(!iso) return false; const d=new Date(iso), n=new Date();
  if(period==='mes') return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();
  if(period==='mespass'){ const m=new Date(n.getFullYear(),n.getMonth()-1,1); return d.getMonth()===m.getMonth()&&d.getFullYear()===m.getFullYear(); }
  if(period==='ano') return d.getFullYear()===n.getFullYear();
  return true;
}

let dragId=null;
function wireKanban(){
  document.querySelectorAll('.kcard').forEach(el=>{
    el.addEventListener('dragstart',e=>{ dragId=el.dataset.os; el.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
    el.addEventListener('dragend',()=>{ el.classList.remove('dragging'); dragId=null; document.querySelectorAll('.kcol').forEach(c=>c.classList.remove('drop')); });
  });
  document.querySelectorAll('.kcol').forEach(col=>{
    col.addEventListener('dragover',e=>{ e.preventDefault(); col.classList.add('drop'); });
    col.addEventListener('dragleave',()=>col.classList.remove('drop'));
    col.addEventListener('drop',e=>{ e.preventDefault(); const st=col.dataset.col, dId=dragId; col.classList.remove('drop');
      if(dId){ const o=DB.ordens.find(x=>x.id===dId); if(o && o.status!==st){
        confirmAsk({ title:'Mover OS', okLabel:'Confirmar',
          msg:`Mover a OS #${String(o.numero).padStart(4,'0')} para <b>${STATUS[st].label}</b>?`+(st==='entregue'?' As peças darão baixa no estoque.':''),

  });
}

/* ---------- FINANCEIRO ---------- */
function viewFinanceiro(){
  const per=uiState.finPeriod;
  const entregues=DB.ordens.filter(o=>o.status==='entregue'&&inPeriod(o.entregueEm,per));
  const fat=entregues.reduce((s,o)=>s+total(o),0);
  const custoPec=entregues.reduce((s,o)=>s+custoOS(o),0);
  const maoObra=entregues.reduce((s,o)=>s+o.itens.filter(i=>i.tipo==='mao').reduce((a,i)=>a+i.qtd*i.preco,0),0);
  const pecasFat=entregues.reduce((s,o)=>s+o.itens.filter(i=>i.tipo==='peca').reduce((a,i)=>a+i.qtd*i.preco,0),0);
  // taxas de cartão ABSORVIDAS pela oficina (custo real); repassadas não contam
  const taxasCartao=entregues.reduce((s,o)=>{ const p=pagCalc(total(o),pagOf(o)); return s + (p.isCard&&!p.repassar?p.taxa:0); },0);
  const lucro=fat-custoPec-taxasCartao, margem=fat?Math.round(lucro/fat*100):0;
  const ticket=entregues.length?fat/entregues.length:0;
  // Recebido = regime de CAIXA: OS pagas cujo pagamento caiu no período (por data de pagamento)
  const recebido=DB.ordens.filter(o=>pagOf(o).pago&&inPeriod(pagoEmOf(o),per)).reduce((s,o)=>s+total(o),0);
  // A receber = tudo em aberto + entregue não pago (saldo devedor, não filtrado por período)
  const aReceber=DB.ordens.filter(o=>!pagOf(o).pago&&['aguardando','em_servico','pronto','entregue'].includes(o.status)).reduce((s,o)=>s+total(o),0);
  const perBtn=(id,lbl)=>`<button class="fchip ${per===id?'active':''}" data-period="${id}">${lbl}</button>`;

  // gráfico: faturamento últimos 6 meses
  const months=[]; const n=new Date();
  for(let i=5;i>=0;i--){ const d=new Date(n.getFullYear(),n.getMonth()-i,1); months.push(d); }
  const monthFat=months.map(d=>DB.ordens.filter(o=>o.status==='entregue'&&o.entregueEm&&new Date(o.entregueEm).getMonth()===d.getMonth()&&new Date(o.entregueEm).getFullYear()===d.getFullYear()).reduce((s,o)=>s+total(o),0));

/* ---------- COMPRA & VENDA DE CARROS ---------- */
function carStatusChip(st){ const s=CAR_STATUS[st]||CAR_STATUS.estoque; return `<span class="chip cst-${st}" style="color:${s.color};background:color-mix(in srgb,${s.color} 15%,transparent)"><span class="dot" style="background:${s.color}"></span>${CAR_STATUS_EMO[st]||''} ${s.label}</span>`; }
function viewCarros(){
  const f=uiState.carFilter;
  let list=[...DB.carros].sort((a,b)=>new Date(b.criadoEm)-new Date(a.criadoEm));
  if(f!=='todos') list=list.filter(o=>o.status===f);
  const estoque=DB.carros.filter(o=>['estoque','reservado'].includes(o.status));
  const invest=estoque.reduce((s,o)=>s+(+o.precoAquisicao||0)+(+o.custosExtras||0),0);
  const vendidos=DB.carros.filter(o=>['vendido','entregue'].includes(o.status));
  const lucro=vendidos.reduce((s,o)=>s+carCalc(o).lucro,0);
  const aReceber=vendidos.reduce((s,o)=>s+carCalc(o).aReceber,0);
  const recebido=vendidos.reduce((s,o)=>s+carCalc(o).recebido,0);
  const kpi=(l,v,d,c)=>`<div class="card kpi"><span class="lbl">${l}</span><span class="val tnum" ${c?`style="color:${c}"`:''}>${v}</span>${d?`<span class="delta">${d}</span>`:''}</div>`;
  const counts={}; DB.carros.forEach(o=>counts[o.status]=(counts[o.status]||0)+1);
  const fchip=(id,lbl)=>`<button class="fchip ${f===id?'active':''}" data-carfilter="${id}">${lbl}${counts[id]?` · ${counts[id]}`:''}</button>`;
  const kpis=`<div class="grid kpis">
    ${kpi('Em estoque',estoque.length,yen(invest)+' investido')}
    ${kpi('Vendidos',vendidos.length,'no total')}
    ${kpi('Lucro (vendas)',yen(lucro),'preço − aquisição','var(--green)')}
    ${kpi('A receber',yen(aReceber),yen(recebido)+' já recebido','var(--warn)')}
  </div>`;
  const filters=`<div class="filters" style="margin:14px 0"><button class="fchip ${f==='todos'?'active':''}" data-carfilter="todos">Todos · ${DB.carros.length}</button>${Object.keys(CAR_STATUS).map(k=>fchip(k,CAR_STATUS[k].label)).join('')}</div>`;
  if(!list.length) return kpis+filters+emptyBox('Nenhum carro','Cadastre um carro/negócio no botão “Novo negócio”.');
  const rows=list.map(o=>{ const c=cliente(o.clienteId), cc=carCalc(o);
    const pg = ['vendido','entregue'].includes(o.status) ? (cc.aReceber<=0?'<span class="paytag ok">● Quitado</span>':`<span class="paytag due">● ${yen(cc.aReceber)}</span>`) : '<span class="muted" style="font-size:11px">—</span>';
    return `<tr class="click" data-car="${o.id}">
      <td class="mono">#${String(o.numero).padStart(4,'0')}</td>
      <td><b>${esc(o.carro?.desc||'—')}</b><div class="hide-sm" style="font-size:11px;color:var(--muted-2)">${o.carro?.ano||''} · ${o.carro?.km?Number(o.carro.km).toLocaleString('en-US')+' km':''}</div></td>
      <td class="hide-sm">${c?esc(c.nome):'<span class="muted">—</span>'}</td>
      <td>${carStatusChip(o.status)}</td>
      <td class="right mono"><b>${yen(o.precoVenda)}</b></td>
      <td class="right mono hide-sm" style="color:var(--green)">${cc.vendido?yen(cc.lucro):'—'}</td>
      <td class="hide-sm">${pg}</td>
    </tr>`; }).join('');
  return kpis+filters+`<div class="card table-wrap"><table class="tbl"><thead><tr>
    <th>Nº</th><th>Carro</th><th class="hide-sm">Cliente</th><th>Status</th><th class="right">Venda</th><th class="right hide-sm">Lucro</th><th class="hide-sm">Recebimento</th>
  </tr></thead><tbody>${rows}</tbody></table></div>`;
}

/* ---------- RELATÓRIO ---------- */
function viewRelatorio(){
  const per=uiState.relPeriod;
  const perBtn=(id,lbl)=>`<button class="fchip ${per===id?'active':''}" data-relperiod="${id}">${lbl}</button>`;
  const entregues=DB.ordens.filter(o=>o.status==='entregue'&&inPeriod(o.entregueEm,per));
  const fat=entregues.reduce((s,o)=>s+total(o),0);
  const custoPec=entregues.reduce((s,o)=>s+custoOS(o),0);
  const taxas=entregues.reduce((s,o)=>{ const p=pagCalc(total(o),pagOf(o)); return s+(p.isCard&&!p.repassar?p.taxa:0); },0);
  const custoTot=custoPec+taxas, lucro=fat-custoTot, margem=fat?Math.round(lucro/fat*100):0;
  const kpi=(lbl,val,delta,cls)=>`<div class="card kpi"><span class="lbl">${lbl}</span><span class="val tnum" ${cls?`style="color:${cls}"`:''}>${val}</span>${delta?`<span class="delta">${delta}</span>`:''}</div>`;

  // serviços por categoria (mão de obra)
  const cats={};
  for(const o of entregues) for(const it of o.itens) if(it.tipo==='mao'){ const c=classifyService(it.desc); (cats[c]=cats[c]||{n:0,rec:0}); cats[c].n+=it.qtd; cats[c].rec+=it.qtd*it.preco; }
  const catArr=Object.entries(cats).map(([k,v])=>({cat:k,...v})).sort((a,b)=>b.rec-a.rec);
  const maxRec=Math.max(1,...catArr.map(c=>c.rec));
  const topCat=catArr[0];
  const servHTML = catArr.length ? `<div class="relbars">${catArr.map(c=>`
      <div class="relbar"><span class="rl">${esc(c.cat)}</span>
        <div class="track"><div class="fill" style="width:${Math.round(c.rec/maxRec*100)}%"></div></div>
        <span class="rv">${c.n}× · <b>${yen(c.rec)}</b></span></div>`).join('')}</div>`
    : '<div class="hint">Nenhum serviço entregue no período.</div>';

  // formas de pagamento
  const pags={}; for(const o of entregues){ const f=pagOf(o).forma; (pags[f]=pags[f]||{n:0,v:0}); pags[f].n++; pags[f].v+=total(o); }
  const pagCols={dinheiro:'#12996a',credito:'#d81f2b',debito:'#e0850e',transferencia:'#2f6bd6',paypay:'#7256e6',combinar:'#6b7280'};
  const pagArr=Object.entries(pags).sort((a,b)=>b[1].v-a[1].v);
  const pagHTML = pagArr.length ? `<div class="paylist">${pagArr.map(([f,d])=>`<div class="payline"><span class="pd" style="background:${pagCols[f]||'#888'}"></span>${PAG_EMO[f]||''} ${PAG[f]||f} <span class="muted">· ${d.n} OS</span><span class="pv">${yen(d.v)}</span></div>`).join('')}</div>` : '<div class="hint">—</div>';

  // top clientes (por gasto total, geral)
  const tops=DB.clientes.map(c=>({c,st:clienteStats(c.id)})).filter(x=>x.st.n>0).sort((a,b)=>b.st.gasto-a.st.gasto).slice(0,5);
  const topHTML = tops.length ? `<div class="card table-wrap"><table class="tbl"><thead><tr><th>Cliente</th><th class="right">OS</th><th class="right">Gasto</th><th class="right hide-sm">Lucro gerado</th></tr></thead><tbody>
      ${tops.map(({c,st})=>`<tr class="click" data-cli="${c.id}"><td><b>${esc(c.nome)}</b> ${clienteBadge(st.tier)}</td><td class="right mono">${st.n}</td><td class="right mono"><b>${yen(st.gasto)}</b></td><td class="right mono muted hide-sm">${yen(st.lucro)}</td></tr>`).join('')}
    </tbody></table></div>` : '<div class="hint">Nenhum cliente com OS entregue ainda.</div>';

  return `<div class="filters" style="margin-bottom:14px">${perBtn('mes','Mês atual')}${perBtn('mespass','Mês passado')}${perBtn('ano','Ano')}${perBtn('tudo','Tudo')}</div>
  <div class="grid kpis">
    ${kpi('Faturamento',yen(fat),entregues.length+' OS entregues')}
    ${kpi('Custos (peças + taxas)',yen(custoTot),'peças '+yen(custoPec)+' · taxas '+yen(taxas),'var(--st-recusado)')}
    ${kpi('Lucro',yen(lucro),'margem '+margem+'%','var(--green)')}
    ${kpi('Ticket médio',yen(entregues.length?fat/entregues.length:0))}
  </div>
  ${topCat?`<div class="alert info" style="margin-top:14px">${icon('M13 2L3 14h9l-1 8 10-12h-9l1-8z')}Serviço que mais gera receita no período: <b style="margin-left:4px">${esc(topCat.cat)}</b> — ${topCat.n}× · ${yen(topCat.rec)}</div>`:''}
  <div class="section-h"><h2>Serviços mais realizados</h2></div>
  <div class="card pad">${servHTML}</div>
  <div class="rel2col" style="margin-top:6px">
    <div><div class="section-h"><h2>Formas de pagamento</h2></div><div class="card pad">${pagHTML}</div></div>
    <div><div class="section-h"><h2>Melhores clientes</h2></div>${topHTML}</div>
  </div>`;
}

/* diálogo de confirmação — toda alteração sensível passa por aqui (Tem certeza?) */
let _confirmCb=null, _confirmCancelCb=null;
function closeConfirm(){ const cc=_confirmCancelCb; $('#confirmRoot').innerHTML=''; _confirmCb=null; _confirmCancelCb=null; if(cc) cc(); }
function confirmAsk({title,msg,impact,okLabel,kind,onOk,onCancel}){
  _confirmCb=onOk; _confirmCancelCb=onCancel||null;
  const tone = kind==='danger' ? {c:'var(--red)',bg:'color-mix(in srgb,var(--red) 12%,transparent)',btn:'solid-red',ic:'M12 9v4M12 17h.01M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z'}
    : kind==='money' ? {c:'var(--green)',bg:'color-mix(in srgb,var(--green) 12%,transparent)',btn:'solid-green',ic:'M20 6 9 17l-5-5'}
    : {c:'var(--primary)',bg:'var(--primary-soft)',btn:'primary',ic:'M12 8v4M12 16h.01M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2z'};
  $('#confirmRoot').innerHTML=`<div class="confirm-back" data-confirm-cancel>
    <div class="confirm-box" role="alertdialog">
      <div class="ch"><div class="ci" style="background:${tone.bg};color:${tone.c}">${icon(tone.ic)}</div><h3>${title}</h3></div>
      <div class="cb">${msg}${impact?`<div class="impact">${impact}</div>`:''}</div>
      <div class="cf"><button class="btn ghost" data-confirm-cancel>Cancelar</button><button class="btn ${tone.btn}" id="confirmOk">${okLabel||'Confirmar'}</button></div>
    </div></div>`;
  $('#confirmOk').onclick=()=>{ const cb=_confirmCb; _confirmCb=null; _confirmCancelCb=null; $('#confirmRoot').innerHTML=''; if(cb) cb(); };
}

function totBoxHTML(d){
  const sub=d.itens.reduce((s,i)=>s+i.qtd*i.preco,0), base=Math.max(0,sub-(d.desconto||0));
  const p=pagCalc(base, d.pagamento);
  let lines=`<div class="l"><span class="muted">Subtotal</span><span class="mono">${yen(sub)}</span></div>
    <div class="l"><span class="muted">Desconto</span><span class="mono">- ${yen(d.desconto||0)}</span></div>`;
  if(p.isCard && p.taxa>0){
    lines+=`<div class="l"><span class="muted">Taxa ${PAG[p.forma]} (${(+d.pagamento.taxaPct||0)}%)</span><span class="mono" style="color:var(--st-recusado)">${p.repassar?'+ ':'- '}${yen(p.taxa)}</span></div>`;
  }
  lines+=`<div class="l big"><span>${p.repassar&&p.taxa>0?'Total ao cliente':'Total'}</span><span class="mono">${yen(p.cliente)}</span></div>`;
  if(p.parc>1) lines+=`<div class="l"><span class="muted">Parcelamento</span><span class="mono">${p.parc}× de ${yen(p.parcela)}</span></div>`;
  if(p.isCard && p.taxa>0 && !p.repassar) lines+=`<div class="l"><span class="muted">Líquido p/ oficina</span><span class="mono" style="color:var(--st-entregue);font-weight:700">${yen(p.liquido)}</span></div>`;
  return lines;
}

let carDraft=null;
function modalCarro(carId){
  const ed=carId?carro(carId):null;
  carDraft = ed?JSON.parse(JSON.stringify(ed)):{id:null,clienteId:'',carro:{desc:'',ano:'',km:'',placa:''},precoAquisicao:0,custosExtras:0,precoVenda:0,entrada:{tipo:'nenhuma',valor:0,trocaDesc:''},fin:{forma:'avista',modo:'parcelas',nParcelas:6,valorParcela:0,diaVenc:5,taxaPct:0},parcelasPagas:0,entradaPaga:false,status:'estoque'};
  if(!carDraft.entrada) carDraft.entrada={tipo:'nenhuma',valor:0,trocaDesc:''};
  if(!carDraft.fin) carDraft.fin={forma:'avista',modo:'parcelas',nParcelas:6,valorParcela:0,diaVenc:5,taxaPct:TAXA_PADRAO};

function carFin(d){ // cálculo ao vivo p/ o formulário
  const venda=+d.precoVenda||0, ent=+ (d.entrada?.valor)||0;
  const f=d.fin||{};
  const taxaPct=Math.max(0,+f.taxaPct||0);
  const acrescimo=Math.round(venda*taxaPct/100);
  const totalCliente=venda+acrescimo;
  const restante=Math.max(0,totalCliente-ent);
  let n=Math.max(1,+f.nParcelas||1), vp=+f.valorParcela||0;
  if(f.forma==='parcelado'){ if(f.modo==='valor'){ n=Math.max(1,Math.ceil(restante/(vp||restante||1))); } else { vp=n?Math.round(restante/n):restante; } }
  const lucro=venda-(+d.precoAquisicao||0)-(+d.custosExtras||0);
  return {venda,ent,acrescimo,totalCliente,taxaPct,restante,n,vp,lucro};
}

    h+=`<div class="l"><span class="muted">Total ao cliente</span><span class="mono"><b>${yen(fc.totalCliente)}</b></span></div>`; }
  if(fc.ent>0) h+=`<div class="l"><span class="muted">Entrada ${CAR_ENTRADA_EMO[d.entrada.tipo]||''} (${CAR_ENTRADA[d.entrada.tipo]||''})</span><span class="mono">- ${yen(fc.ent)}</span></div>`;

  return h;
}

      <div><div class="k">Pagamento</div><div class="v">${carFinLabel(o.fin?.forma)}${(o.fin?.forma)==='parcelado'?` · ${cc.nParc}× de ${yen(cc.valorParcela)}`:''}</div></div>
    </div>
    ${cc.trocaAtivo>0?`<div class="alert info" style="margin:8px 0">Recebeu na troca: <b>${esc(ent.trocaDesc)}</b> avaliado em ${yen(cc.trocaAtivo)} (entra no seu estoque para revenda)</div>`:''}
    ${pgBox}

      <div class="field"><label>Ações</label><div style="display:flex;gap:8px"><button class="btn sm" data-act="edit-carro" data-id="${o.id}">Editar</button><button class="btn sm" data-act="print-os">Imprimir</button></div></div>

}

function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200); }
function openDrawer(){ $('#drawer').classList.add('open'); $('#drawerBack').classList.add('open'); }
function closeDrawer(){ $('#drawer').classList.remove('open'); $('#drawerBack').classList.remove('open'); }
/* MODO de tema — o botão cicla entre 3: Claro, Escuro e Cinza */
const MODES=[{id:'light',nome:'Claro',dot:'#ffffff'},{id:'dark',nome:'Escuro',dot:'#15181d'},{id:'gray',nome:'Cinza',dot:'#5b616b'}];
function applyMode(id){
  const m=MODES.find(x=>x.id===id)||MODES[0];
  document.documentElement.setAttribute('data-theme',m.id);
  for(const [n,d] of [['#modeName','#modeDot'],['#modeName2','#modeDot2']]){
    const en=$(n), ed=$(d); if(en) en.textContent=m.nome; if(ed) ed.style.background=m.dot;
  }
}
function cycleMode(){
  const cur=MODES.some(x=>x.id===DB.theme)?DB.theme:'light';
  const i=MODES.findIndex(x=>x.id===cur);
  const next=MODES[(i+1)%MODES.length];
  DB.theme=next.id; applyMode(next.id); save(); toast('Modo: '+next.nome);
}

document.addEventListener('click',e=>{
  // diálogo de confirmação: cancelar (fora do botão OK) fecha sem agir
  const cc=e.target.closest('[data-confirm-cancel]');
  if(cc && (e.target===cc || cc.classList.contains('confirm-back') || cc.classList.contains('btn'))){ closeConfirm(); return; }
  const nav=e.target.closest('[data-nav]'); if(nav){ go(nav.dataset.nav); return; }
  const t=e.target.closest('[data-act]');
  const back=e.target.closest('[data-modal-back]');
  if(back && (e.target===back || e.target.classList.contains('x') || e.target.classList.contains('modal-back') || back.classList.contains('btn'))){ if(!t){ closeModal(); return; } }

  // linhas clicáveis
  const osRow=e.target.closest('[data-os]'); if(osRow && !t){ modalDetalhe(osRow.dataset.os); return; }
  const cliRow=e.target.closest('[data-cli]'); if(cliRow && !t && !e.target.closest('.modal')){ modalCliDetalhe(cliRow.dataset.cli); return; }
  const pcRow=e.target.closest('[data-peca]'); if(pcRow && !t){ modalPeca(pcRow.dataset.peca); return; }
  const carRow=e.target.closest('[data-car]'); if(carRow && !t){ modalCarDetalhe(carRow.dataset.car); return; }

  if(!t) return;
  const act=t.dataset.act, id=t.dataset.id;
  switch(act){
    case 'drawer': openDrawer(); break;
    case 'drawer-close': closeDrawer(); break;
    case 'mode': cycleMode(); break;
    case 'reset': confirmAsk({title:'Zerar dados',kind:'danger',okLabel:'Zerar tudo',msg:'Isso apaga tudo e recarrega os dados de exemplo. Não dá pra desfazer.',onOk:()=>{ seed(); render(); toast('Dados de exemplo recarregados'); }}); break;
    case 'nova-os': modalOS(); break;
    case 'novo-cliente': modalCliente(); break;
    case 'nova-peca': modalPeca(); break;
    case 'save-cliente': saveCliente(id); break;
    case 'save-peca': savePeca(id); break;
    case 'del-peca': confirmAsk({title:'Excluir peça',kind:'danger',okLabel:'Excluir',msg:'Tem certeza que deseja excluir esta peça do estoque?',onOk:()=>{ DB.pecas=DB.pecas.filter(p=>p.id!==id); save(); closeModal(); render(); toast('Peça excluída'); }}); break;
    case 'save-os': saveOS(); break;
    case 'add-mao': osDraft.itens.push({id:uid(),tipo:'mao',desc:'',qtd:1,preco:0,custo:0}); refreshOSForm(); break;
    case 'rm-item': syncDraftInputs(); osDraft.itens.splice(+t.dataset.ix,1); refreshOSForm(); break;
    case 'set-status': break; // via change
    case 'edit-os': closeModal(); modalOS(id); break;
    case 'del-os': confirmAsk({title:'Excluir OS',kind:'danger',okLabel:'Excluir',msg:'Tem certeza que deseja excluir esta ordem de serviço? Isso também remove o valor dela dos relatórios.',onOk:()=>{ const o=DB.ordens.find(x=>x.id===id); if(o&&o.consumido) restoreStock(o); DB.ordens=DB.ordens.filter(x=>x.id!==id); save(); closeModal(); render(); toast('OS excluída'); }}); break;
    case 'print-os': window.print(); break;
    case 'toggle-pago': { const o=DB.ordens.find(x=>x.id===id); if(!o) break;
      const val=total(o), vaiPagar=!pagOf(o).pago;
      if(vaiPagar){
        confirmAsk({ title:'Registrar pagamento', kind:'money', okLabel:'Confirmar pagamento',
          msg:`Confirmar o recebimento desta OS? O pagamento será registrado com a data de <b>hoje</b>.`,
          impact:`${icon('M20 6 9 17l-5-5')}<span>Soma <b>${yen(val)}</b> ao Recebido do mês</span>`,
          onOk:()=>{ o.pagamento=pagOf(o); o.pagamento.pago=true; o.pagamento.pagoEm=nowISO(); o.hist.push({t:nowISO(),txt:'Pagamento recebido ('+yen(val)+')'}); save(); render(); modalDetalhe(o.id); toast('Pagamento registrado — ganhos atualizados'); } });
      } else {
        confirmAsk({ title:'Estornar pagamento', kind:'danger', okLabel:'Estornar',
          msg:`Tem certeza que deseja <b>estornar</b> o pagamento desta OS? Ela volta para pendente.`,
          impact:`${icon('M3 12a9 9 0 1 0 9-9 9 9 0 0 0-6.4 2.6L3 8M3 3v5h5')}<span>Subtrai <b>${yen(val)}</b> do Recebido do mês</span>`,
          onOk:()=>{ o.pagamento=pagOf(o); o.pagamento.pago=false; o.pagamento.pagoEm=null; o.hist.push({t:nowISO(),txt:'Pagamento estornado ('+yen(val)+')'}); save(); render(); modalDetalhe(o.id); toast('Pagamento estornado'); } });
      }
      break; }
    case 'del-cliente': confirmAsk({title:'Excluir cliente',kind:'danger',okLabel:'Excluir',msg:'Excluir este cliente e seus veículos? As OS dele permanecem no histórico.',onOk:()=>{ DB.clientes=DB.clientes.filter(c=>c.id!==id); DB.veiculos=DB.veiculos.filter(v=>v.clienteId!==id); save(); closeModal(); render(); toast('Cliente excluído'); }}); break;
    case 'nova-os-cli': closeModal(); modalOS(); osDraft.clienteId=t.dataset.cli; refreshOSForm(); break;
    case 'novo-veiculo': syncDraftInputs&&syncDraftInputs(); modalVeiculo(t.dataset.cli||osDraft?.clienteId||'', osDraft?'reopen-os':'close'); break;

    case 'close': closeModal(); if(osFormBack){ openModal(osFormHTML(),true); osFormBack=false; } break;
    case 'reopen-os': closeModal(); openModal(osFormHTML(),true); break;

    case 'edit-cliente': closeModal(); modalCliente(id); break;
    case 'edit-veiculo': { const v=veiculo(id); if(v){ closeModal(); modalVeiculo(v.clienteId,'',id); } break; }

    /* ---- configurações: categorias e serviços ---- */
    case 'nova-categoria': modalCategoria(); break;
    case 'edit-categoria': modalCategoria(id); break;
    case 'save-categoria': saveCategoria(id); break;
    case 'del-categoria': { const cat=categoria(id); const n=servicosDe(id).length;
      confirmAsk({title:'Excluir categoria',kind:'danger',okLabel:'Excluir',msg:`Excluir a categoria <b>${esc(cat?.nome||'')}</b>?${n?` Isso também remove <b>${n} serviço(s)</b> dela.`:''}`,onOk:()=>{ DB.categorias=DB.categorias.filter(c=>c.id!==id); DB.servicos=DB.servicos.filter(s=>s.categoriaId!==id); save(); closeModal(); render(); toast('Categoria excluída'); }}); break; }

    case 'edit-servico': modalServico(id); break;
    case 'save-servico': saveServico(id); break;
    case 'del-servico': { const s=DB.servicos.find(x=>x.id===id);
      confirmAsk({title:'Excluir serviço',kind:'danger',okLabel:'Excluir',msg:`Excluir o serviço <b>${esc(s?.nome||'')}</b> do catálogo?`,onOk:()=>{ DB.servicos=DB.servicos.filter(x=>x.id!==id); save(); closeModal(); render(); toast('Serviço excluído'); }}); break; }
    /* ---- compra & venda de carros ---- */
    case 'novo-carro': modalCarro(); break;
    case 'save-carro': saveCarro(); break;
    case 'edit-carro': closeModal(); modalCarro(id); break;

    case 'car-pago': { const o=carro(id); if(!o) break; const cc=carCalc(o), pago=cc.aReceber<=0;
      if(!pago){ confirmAsk({title:'Registrar pagamento',kind:'money',okLabel:'Confirmar',msg:'Confirmar o recebimento do restante deste negócio? Registrado com a data de <b>hoje</b>.',impact:`${icon('M20 6 9 17l-5-5')}<span>Soma <b>${yen(cc.aReceber)}</b> ao recebido</span>`,onOk:()=>{ o.pago=true; o.pagoEm=nowISO(); o.hist=o.hist||[]; o.hist.push({t:nowISO(),txt:'Pagamento recebido ('+yen(cc.restante)+')'}); save(); render(); modalCarDetalhe(o.id); toast('Pagamento registrado'); }}); }
      else { confirmAsk({title:'Estornar pagamento',kind:'danger',okLabel:'Estornar',msg:'Tem certeza que deseja <b>estornar</b> o pagamento deste negócio?',onOk:()=>{ o.pago=false; o.pagoEm=null; o.hist=o.hist||[]; o.hist.push({t:nowISO(),txt:'Pagamento estornado'}); save(); render(); modalCarDetalhe(o.id); toast('Pagamento estornado'); }}); }
      break; }
    case 'car-parc-mais': { const o=carro(id); if(!o) break; const cc=carCalc(o);

    case 'car-parc-menos': { const o=carro(id); if(!o) break; const cc=carCalc(o);
      confirmAsk({title:'Estornar parcela',kind:'danger',okLabel:'Estornar',msg:`Estornar a parcela <b>${cc.parcelasPagas}/${cc.nParc}</b>?`,onOk:()=>{ o.parcelasPagas=Math.max(0,(+o.parcelasPagas||0)-1); o.hist=o.hist||[]; o.hist.push({t:nowISO(),txt:'Parcela estornada'}); save(); render(); modalCarDetalhe(o.id); toast('Parcela estornada'); }}); break; }
    case 'car-entrada': { const o=carro(id); if(!o) break; const ent=o.entrada||{};
      confirmAsk({title:'Registrar entrada',kind:'money',okLabel:'Confirmar',msg:'Confirmar o recebimento da entrada em dinheiro?',impact:`${icon('M20 6 9 17l-5-5')}<span>Soma <b>${yen(+ent.valor||0)}</b> ao recebido</span>`,onOk:()=>{ o.entradaPaga=true; o.hist=o.hist||[]; o.hist.push({t:nowISO(),txt:'Entrada recebida ('+yen(+ent.valor||0)+')'}); save(); render(); modalCarDetalhe(o.id); toast('Entrada registrada'); }}); break; }
    case 'car-parc': { const o=carro(id); if(!o) break; const k=+t.dataset.k, cc=carCalc(o);
      if(k===cc.parcelasPagas+1){ // dar baixa na próxima parcela
        confirmAsk({title:'Registrar parcela',kind:'money',okLabel:'Confirmar recebimento',msg:`Registrar o pagamento da parcela <b>${k}/${cc.nParc}</b> (vence ${fmtDate(parcelaVenc(o,k))})?`,impact:`${icon('M20 6 9 17l-5-5')}<span>Soma <b>${yen(cc.valorParcela)}</b> ao recebido</span>`,onOk:()=>{ o.parcelasPagas=k; o.hist=o.hist||[]; o.hist.push({t:nowISO(),txt:'Parcela '+k+'/'+cc.nParc+' recebida ('+yen(cc.valorParcela)+')'}); save(); render(); modalCarDetalhe(o.id); toast('Parcela '+k+' registrada'); }});
      } else if(k===cc.parcelasPagas){ // estornar a última paga
        confirmAsk({title:'Estornar parcela',kind:'danger',okLabel:'Estornar',msg:`Estornar a parcela <b>${k}/${cc.nParc}</b>? O valor sai do recebido.`,onOk:()=>{ o.parcelasPagas=k-1; o.hist=o.hist||[]; o.hist.push({t:nowISO(),txt:'Parcela '+k+' estornada'}); save(); render(); modalCarDetalhe(o.id); toast('Parcela estornada'); }});
      } else if(k>cc.parcelasPagas){ toast('Pague as parcelas anteriores primeiro'); }
      else { toast('Estorne primeiro as parcelas seguintes'); }
      break; }
    case 'car-whats': { const o=carro(id); if(!o) break; const c=cliente(o.clienteId), msg=carWhatsMsg(o);
      const digits=(c?.telefone||'').replace(/\D/g,''); const intl=digits?('81'+digits.replace(/^0/,'')):'';
      const url='https://wa.me/'+intl+'?text='+encodeURIComponent(msg);
      const done=()=>{ try{ window.open(url,'_blank'); }catch(_){} toast('Mensagem copiada — abrindo WhatsApp'); };
      if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(msg).then(done).catch(done); } else done();
      break; }
  }
});
// filtros / views / períodos / status (delegação de change + click)
document.addEventListener('click',e=>{
  const f=e.target.closest('[data-filter]'); if(f){ uiState.ordFilter=f.dataset.filter; render(); }
  const vw=e.target.closest('[data-view]'); if(vw){ uiState.ordView=vw.dataset.view; render(); }
  const pr=e.target.closest('[data-period]'); if(pr){ uiState.finPeriod=pr.dataset.period; render(); }
  const rp=e.target.closest('[data-relperiod]'); if(rp){ uiState.relPeriod=rp.dataset.relperiod; render(); }
  const cf=e.target.closest('[data-carfilter]'); if(cf){ uiState.carFilter=cf.dataset.carfilter; render(); }
});
document.addEventListener('change',e=>{
  const ss=e.target.closest('[data-act="set-status"]'); if(ss){ const o=DB.ordens.find(x=>x.id===ss.dataset.id), novo=e.target.value;
    if(o){ confirmAsk({ title:'Mudar status', okLabel:'Confirmar',
      msg:`Mudar o status desta OS para <b>${STATUS[novo].label}</b>?`+(novo==='entregue'?' Ao marcar como entregue, as peças dão baixa no estoque.':''),
      onOk:()=>{ setStatus(o,novo); render(); modalDetalhe(o.id); toast('Status atualizado'); },
      onCancel:()=>modalDetalhe(o.id) }); }  // cancelar reabre o detalhe e reseta o seletor
    return; }
  // mudar status de um negócio de carro (no detalhe)
  const cs=e.target.closest('[data-act="car-status"]'); if(cs){ const o=carro(cs.dataset.id), novo=e.target.value;
    if(o){ confirmAsk({ title:'Mudar status', okLabel:'Confirmar',
      msg:`Mudar o status deste negócio para <b>${CAR_STATUS[novo].label}</b>?`,
      onOk:()=>{ o.status=novo; if((novo==='vendido'||novo==='entregue')&&!o.vendidoEm) o.vendidoEm=nowISO(); o.hist=o.hist||[]; o.hist.push({t:nowISO(),txt:'Status → '+CAR_STATUS[novo].label}); save(); render(); modalCarDetalhe(o.id); toast('Status atualizado'); },
      onCancel:()=>modalCarDetalhe(o.id) }); }
    return; }
  // selects do formulário de carro
  if(e.target.id==='cr_cli'){ syncCarInputs(); carDraft.clienteId=e.target.value; carRecalc(); return; }
  if(e.target.id==='cr_enttipo'){ syncCarInputs(); carDraft.entrada.tipo=e.target.value; if(e.target.value==='nenhuma') carDraft.entrada.valor=0; refreshCarForm(); return; }
  if(e.target.id==='cr_forma'){ syncCarInputs(); carDraft.fin.forma=e.target.value; refreshCarForm(); return; }
  if(e.target.id==='cr_modo'){ syncCarInputs(); carDraft.fin.modo=e.target.value; refreshCarForm(); return; }
  if(e.target.id==='cr_status'){ carDraft.status=e.target.value; return; }
  if(e.target.id==='os_cli'){ syncDraftInputs(); osDraft.clienteId=e.target.value; osDraft.veiculoId=''; refreshOSForm(); return; }
  if(e.target.id==='os_veh'){ osDraft.veiculoId=e.target.value; const v=veiculo(e.target.value); if(v&&$('#os_km')&&!$('#os_km').value) $('#os_km').value=v.km||''; return; }
  if(e.target.id==='pecaPick'){ const p=peca(e.target.value); if(p){ syncDraftInputs(); osDraft.itens.push({id:uid(),tipo:'peca',pecaId:p.id,desc:p.nome,qtd:1,preco:p.preco,custo:p.custo}); refreshOSForm(); } return; }
  if(e.target.id==='servPick'){ const s=DB.servicos.find(x=>x.id===e.target.value); if(s){ syncDraftInputs(); osDraft.itens.push({id:uid(),tipo:'mao',desc:s.nome,qtd:1,preco:+s.preco||0,custo:0}); refreshOSForm(); } return; }
  if(e.target.id==='pg_forma'){ syncDraftInputs(); osDraft.pagamento.forma=e.target.value; refreshOSForm(); return; }  // mostra/esconde bloco do cartão
  if(e.target.id==='pg_pago'){ osDraft.pagamento.pago=e.target.value==='1'; return; }
  if(e.target.id==='pg_rep'){ osDraft.pagamento.repassar=e.target.value==='1'; recalcOS(); return; }
  if(e.target.id==='cliSearch'){ uiState.cliSearch=e.target.value; }
});
document.addEventListener('input',e=>{
  if(e.target.id==='cliSearch'){ uiState.cliSearch=e.target.value; clearTimeout(window._cs); window._cs=setTimeout(()=>{ const v=$('#view'); v.innerHTML=viewClientes(); const inp=$('#cliSearch'); if(inp){ inp.focus(); inp.setSelectionRange(inp.value.length,inp.value.length); } },200); return; }
  // itens da OS
  const row=e.target.closest('.item-row'); if(row){ const ix=+row.dataset.ix, f=e.target.dataset.f, it=osDraft.itens[ix]; if(it){ if(f==='qtd') it.qtd=Math.max(1,+e.target.value||1); else if(f==='preco') it.preco=Math.max(0,+e.target.value||0); else it.desc=e.target.value; recalcOS(); } }
  if(e.target.id==='os_desc'){ osDraft.desconto=Math.max(0,+e.target.value||0); recalcOS(); }
  if(e.target.id==='pg_parc'){ osDraft.pagamento.parcelas=Math.max(1,Math.min(24,+e.target.value||1)); recalcOS(); }
  if(e.target.id==='pg_taxa'){ osDraft.pagamento.taxaPct=Math.max(0,+e.target.value||0); recalcOS(); }
  // formulário de carro: atualiza a caixa de totais ao vivo
  if(carDraft && $('#carTot') && /^cr_/.test(e.target.id||'')){ syncCarInputs(); carRecalc(); }
});
function syncDraftInputs(){ // captura o que está digitado antes de re-render do form
  if(!osDraft) return;
  document.querySelectorAll('#itemsBox .item-row').forEach(row=>{ const ix=+row.dataset.ix, it=osDraft.itens[ix]; if(!it) return;
    const d=row.querySelector('[data-f="desc"]'), q=row.querySelector('[data-f="qtd"]'), p=row.querySelector('[data-f="preco"]');
    if(d) it.desc=d.value; if(q) it.qtd=Math.max(1,+q.value||1); if(p) it.preco=Math.max(0,+p.value||0); });
  if($('#os_tipo')) osDraft.tipo=$('#os_tipo').value;
  if($('#os_km')) osDraft.kmEntrada=$('#os_km').value;
  if($('#os_prev')) osDraft.previsao=$('#os_prev').value;
  if($('#os_desc')) osDraft.desconto=Math.max(0,+$('#os_desc').value||0);
  if($('#os_obs')) osDraft.obs=$('#os_obs').value;
  const pg=osDraft.pagamento||(osDraft.pagamento={forma:'dinheiro',parcelas:1,taxaPct:TAXA_PADRAO,repassar:false,pago:false});
  if($('#pg_forma')) pg.forma=$('#pg_forma').value;
  if($('#pg_pago')) pg.pago=$('#pg_pago').value==='1';
  if($('#pg_parc')) pg.parcelas=Math.max(1,Math.min(24,+$('#pg_parc').value||1));
  if($('#pg_taxa')) pg.taxaPct=Math.max(0,+$('#pg_taxa').value||0);
  if($('#pg_rep')) pg.repassar=$('#pg_rep').value==='1';
}

/* ---- saves ---- */
function saveCliente(id){ const nome=$('#cl_nome').value.trim(); if(!nome){ toast('Informe o nome'); return; }
  const data={nome,telefone:$('#cl_tel').value.trim(),email:$('#cl_email').value.trim(),obs:$('#cl_obs').value.trim()};
  if(id){ const c=cliente(id); if(c) Object.assign(c,data); save(); closeModal(); render(); toast('Cliente atualizado'); return; }
  const c=addCliente(data);
  save(); closeModal(); toast('Cliente cadastrado');
  if(osDraft){ openModal(osFormHTML(),true); osDraft.clienteId=c.id; refreshOSForm(); } else render();
}
function savePeca(id){ const nome=$('#pc_nome').value.trim(); if(!nome){ toast('Informe o nome'); return; }
  const data={nome,sku:$('#pc_sku').value.trim(),qtd:+$('#pc_qtd').value||0,preco:+$('#pc_preco').value||0,custo:+$('#pc_custo').value||0,min:$('#pc_min').value===''?2:(+$('#pc_min').value||0)};
  if(id){ Object.assign(peca(id),data); } else addPeca(data);
  save(); closeModal(); render(); toast('Peça salva');
}
function saveVeiculo(cid,back,id){ const placa=$('#vh_placa').value.trim(); if(!placa){ toast('Informe a placa'); return; }
  const data={placa,marca:$('#vh_marca').value.trim(),modelo:$('#vh_modelo').value.trim(),ano:+$('#vh_ano').value||'',combustivel:$('#vh_comb').value,km:+$('#vh_km').value||0};
  if(id){ const v=veiculo(id); if(v) Object.assign(v,data); save(); closeModal(); modalCliDetalhe(cid||(v?v.clienteId:'')); toast('Veículo atualizado'); return; }
  const v=addVeiculo({clienteId:cid,...data});
  save(); closeModal(); toast('Veículo cadastrado');
  if(back==='reopen-os'&&osDraft){ osDraft.veiculoId=v.id; openModal(osFormHTML(),true); refreshOSForm(); }
  else render();
}
function saveOS(){ syncDraftInputs(); const d=osDraft;
  if(!d.clienteId){ toast('Selecione o cliente'); return; }
  if(!d.veiculoId){ toast('Selecione o veículo'); return; }
  if(!d.itens.length){ toast('Adicione ao menos um item'); return; }
  d.status = d.tipo==='orcamento' ? 'orcamento' : (d.status==='orcamento'?'aguardando':d.status);
  if(d.id){ const o=DB.ordens.find(x=>x.id===d.id); const wasConsumed=o.consumido; if(wasConsumed) restoreStock(o);
    Object.assign(o,{clienteId:d.clienteId,veiculoId:d.veiculoId,tipo:d.tipo,status:d.status,kmEntrada:d.kmEntrada,previsao:d.previsao,obs:d.obs,desconto:d.desconto,itens:d.itens,pagamento:d.pagamento});
    if(o.status==='entregue') consumeStock(o); o.hist.push({t:nowISO(),txt:'OS editada'}); toast('OS atualizada');
  } else {
    const o={id:uid(),numero:DB.seq++,clienteId:d.clienteId,veiculoId:d.veiculoId,tipo:d.tipo,status:d.status,kmEntrada:d.kmEntrada,previsao:d.previsao,obs:d.obs,desconto:d.desconto,itens:d.itens,pagamento:d.pagamento,criadoEm:nowISO(),entregueEm:null,consumido:false,hist:[{t:nowISO(),txt:d.tipo==='orcamento'?'Orçamento criado':'OS criada'}]};
    DB.ordens.push(o); toast(d.tipo==='orcamento'?'Orçamento criado':'OS criada');
  }
  osDraft=null; save(); closeModal(); render();
}
function saveCategoria(id){ const nome=$('#cat_nome').value.trim(); if(!nome){ toast('Informe o nome'); return; }
  if(id){ const c=categoria(id); if(c) c.nome=nome; toast('Categoria atualizada'); } else { addCategoria(nome); toast('Categoria criada'); }
  save(); closeModal(); render();
}
function saveServico(id){ const nome=$('#sv_nome').value.trim(); if(!nome){ toast('Informe o nome'); return; }
  const catId=$('#sv_cat').value, preco=+$('#sv_preco').value||0;
  if(!catId){ toast('Selecione a categoria'); return; }
  if(id){ const s=DB.servicos.find(x=>x.id===id); if(s){ s.nome=nome; s.categoriaId=catId; s.preco=preco; } toast('Serviço atualizado'); }
  else { addServico(catId,nome,preco); toast('Serviço criado'); }
  save(); closeModal(); render();
}
function saveCarro(){ syncCarInputs(); const d=carDraft;
  if(!d.carro.desc.trim()){ toast('Descreva o carro'); return; }
  const fc=carFin(d);
  // consolida o parcelamento calculado
  if(d.fin.forma==='parcelado'){ d.fin.nParcelas=fc.n; d.fin.valorParcela=fc.vp; }
  if(d.id){ const o=carro(d.id); const wasVend=(o.status==='vendido'||o.status==='entregue');
    Object.assign(o,{clienteId:d.clienteId||null,carro:d.carro,precoAquisicao:+d.precoAquisicao||0,custosExtras:+d.custosExtras||0,precoVenda:+d.precoVenda||0,entrada:d.entrada,fin:d.fin,status:d.status});
    if((d.status==='vendido'||d.status==='entregue')&&!o.vendidoEm) o.vendidoEm=nowISO();
    o.hist=o.hist||[]; o.hist.push({t:nowISO(),txt:'Negócio editado'}); toast('Negócio atualizado');
  } else {
    const vend=(d.status==='vendido'||d.status==='entregue');
    const o={id:uid(),numero:DB.carSeq++,clienteId:d.clienteId||null,carro:d.carro,precoAquisicao:+d.precoAquisicao||0,custosExtras:+d.custosExtras||0,
      precoVenda:+d.precoVenda||0,entrada:d.entrada,fin:d.fin,parcelasPagas:0,entradaPaga:false,pago:false,status:d.status,
      criadoEm:nowISO(),vendidoEm:vend?nowISO():null,hist:[{t:nowISO(),txt:d.status==='estoque'?'Carro comprado no leilão':'Negócio criado'}]};
    DB.carros.push(o); toast('Negócio criado');
  }
  carDraft=null; save(); closeModal(); render();
}

/* =========================================================================
   BOOT
   ========================================================================= */
if(!load()){ seed(); }
else if((DB.seedVersion||0) < SEED_VERSION){ const t=DB.theme; seed(); DB.theme=t; save(); }  // recarrega exemplos sem perder o modo
applyMode(MODES.some(x=>x.id===DB.theme)?DB.theme:'light');   // Claro por padrão
render();
</script>
